# Sources config for the weekly scan.
# Edit this file to tune what the podcast scanner picks up — no code changes needed.

# How far back to look (days). Matches a weekly cadence.
window_days: 7

# ---- arXiv -----------------------------------------------------------------
# Category codes: https://arxiv.org/category_taxonomy
# cs.SE = Software Engineering, cs.DC = Distributed/Parallel Computing,
# cs.AI = Artificial Intelligence, cs.LG = Machine Learning, cs.AR = Hardware Arch.
arxiv_categories:
  - cs.SE
  - cs.DC
  - cs.AI
arxiv_max_results: 40

# ---- GitHub ----------------------------------------------------------------
# Repos created in the window, matching ANY keyword, above the star threshold.
github_keywords:
  - ai
  - llm
  - agent
  - developer-tools
  - architecture
github_min_stars: 50

# ---- Hacker News -----------------------------------------------------------
# Discussion threads stay valuable longer than news, so HN has its own window.
hn_window_days: 30          # look back further than the 7-day news window
hn_min_points: 60           # minimum story score to consider
hn_max_stories: 8           # keep the N most-discussed stories
hn_comments_per_story: 6    # top comments pulled per story (for summarization)
hn_keywords:
  - AI
  - LLM
  - software architecture
  - developer productivity
  - distributed systems

# ---- Engineering blogs (RSS / Atom) ----------------------------------------
# Add or remove freely. The scanner auto-detects RSS vs Atom.
blog_feeds:
  - name: AWS Architecture Blog
    url: https://aws.amazon.com/blogs/architecture/feed/
  - name: Netflix TechBlog
    url: https://netflixtechblog.com/feed
  - name: Cloudflare Blog
    url: https://blog.cloudflare.com/rss/
  - name: Uber Engineering
    url: https://www.uber.com/blog/engineering/rss/
  - name: Martin Fowler
    url: https://martinfowler.com/feed.atom
  - name: InfoQ Architecture & Design
    url: https://feed.infoq.com/architecture-design/
  - name: The GitHub Blog (Engineering)
    url: https://github.blog/engineering.atom
  - name: Stripe Engineering
    url: https://stripe.com/blog/feed.rss
