name: Weekly dashboard refresh

on:
  schedule:
    # Every Monday 06:30 UTC. Adjust as you like (cron is UTC).
    - cron: "30 6 * * 1"
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

permissions:
  contents: write           # allows the job to commit the rebuilt dashboard

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect fresh sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/collect.py

      - name: Tag items for the desks
        run: python scripts/tag_items.py

      - name: Rebuild dashboard.html
        run: python scripts/build_dashboard.py

      - name: Commit if changed
        run: |
          git config user.name  "dashboard-bot"
          git config user.email "actions@github.com"
          git add data/ dashboard.html
          if git diff --staged --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Weekly dashboard refresh: $(date -u +%Y-%m-%d)"
            git push
          fi
