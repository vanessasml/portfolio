itle": "UltraX: Refining Pre-Training Data at Scale with Adaptive Programmatic Editing", "url": "http://arxiv.org/abs/2607.08646v1", "summary": "As available training data approaches its physical limit, gains from Scaling Laws have begun to diminish. Consequently, improving Large Language Models (LLMs) now depends less on data expansion and more on higher-quality data utilization. However, in the context of large-scale corpora, existing refinement methodologies face significant limitations in quality, efficiency, and reliability: Rule-base…", "authors": "Xinlong Zhao, Dongsheng Liu, Hengyu Zhao, Zixuan Fu", "published": "2026-07-09", "tags": []}, {"title": "The complexities of patient-centred conversational artificial intelligence", "url": "http://arxiv.org/abs/2607.08625v1", "summary": "Consumer-facing health chatbots powered by large language models (LLMs) are increasingly used for symptom assessment. However, chatbot development and evaluation often rely on cooperative, articulate, simulated patients. We analysed 2,053 real patient-chatbot conversations and found that communication patterns and expression of emotions vary widely across users. We developed a patient simulator th…", "authors": "João Matos, Olivia Buege, Donny Cheung, Gary S. Collins", "published": "2026-07-09", "tags": []}, {"title": "When Structured Sparse Autoencoders Learn Consistent Concepts Across Modalities", "url": "http://arxiv.org/abs/2607.08605v1", "summary": "Sparse autoencoders (SAEs) have emerged as a promising technique for mechanistic interpretability by learning a set of sparse latent features in large models, each of which encodes a distinct concept. However, in vision-language models (VLMs), vanilla SAEs struggle to learn modality-consistent concepts, with concepts often exhibiting fragmented coverage (i.e., disjoint regions) in the visual modal…", "authors": "Weiduo Liao, Yunqiao Yang, Ying Wei", "published": "2026-07-09", "tags": []}, {"title": "Towards Precision Therapy in Hepa ["agents"]}, {"title": "The Context Access Divide: Interaction-Level Architecture as a Complementary Dimension of Agentic Inequality", "url": "http://arxiv.org/abs/2607.08495v1", "summary": "Sharp et al. (2025) introduce \"agentic inequality\" as a framework for analyzing disparities in access to AI agents across three dimensions: availability, quality, and quantity. These person- and organization-level dimensions characterize who can access agents and at what capability, but do not address a structurally important divide operating at a finer level: the individual interaction. Two users…", "authors": "Masahiro Fujita", "published": "2026-07-09", "tags": []}, {"title": "Drift-Aware Temporal Graph Rewiring (DATGR) for Adaptive Semantic Modeling in Biomedical Text", "url": "http://arxiv.org/abs/2607.08490v1", "summary": "Biomedical language evolves rapidly as new discoveries emerge, causing traditional text models to lose semantic fidelity over time. Static embeddings and co-occurrence graphs cannot capture such evolution, leading to performance degradation in retrieval and knowledge discovery tasks. This paper introduces a Drift-Aware Temporal Graph Rewiring (DATGR) framework that models concept evolution by dyna…", "authors": "Bharathwaj Vijayakumar, Sahana K. Varadaraju", "published": "2026-07-09", "tags": ["retrieval"]}, {"title": "VEGAS: Human-Aligned Video Caption Evaluation via Gaze", "url": "http://arxiv.org/abs/2607.08489v1", "summary": "Vision-language models excel at video captioning, yet typically generate descriptions that fail to capture individual viewers' attention. We propose VEGAS (Video caption Evaluation via GAze Score), a training-free metric that leverages test-time gaze to sample personalized, attention-aligned text. It is a cross-modal, information-theoretic metric that quantifies how well a candidate caption matche…", "authors": "Shenghui Chen, Po-han Li, Ximeng Sun, Shijia Yang", "published": "2026-07-09", "tags": []}, {"title": "Applying JEPA ment Learning", "url": "http://arxiv.org/abs/2607.08443v1", "summary": "Dynamic traffic variations in Open Radio Access Networks (O-RAN) lead to drift, which degrades the performance of Artificial Intelligence/Machine Learning (AI/ML) models. Traditional retraining approaches maintain forecasting accuracy but incur high computational cost and may lead to violations of Service Level Agreements (SLAs). This work proposes a Q-learning-based adaptive retraining approach t…", "authors": "Ashit Kumar Subudhi, Bhargav Chirumamilla, Shubham Vaishnav, Mduduzi C. Hlophe", "published": "2026-07-09", "tags": []}, {"title": "Coded Task Offloading for Fluid Computing: A Privacy-Aware Approach under D2D Networks", "url": "http://arxiv.org/abs/2607.08440v1", "summary": "Fluid Computing aims to support distributed applications execution across heterogeneous cloud, edge, and device resources, motivating task execution mechanisms that adapt to dynamic and privacy-sensitive environments under runtime conditions. In this context, current task offloading schemes rarely address privacy risks and information leakage under adversarial execution settings; furthermore, most…", "authors": "Diego Cajaraville-Aboy, Manuel Fernández-Veiga, Ana Fernández-Vilas, Rebeca P. Díaz-Redondo", "published": "2026-07-09", "tags": []}, {"title": "Predicting Male Fertility Using Machine Learning: A Semen Parameters Based Analysis with the VISEM Dataset", "url": "http://arxiv.org/abs/2607.08429v1", "summary": "Male infertility is a significant yet often underdiagnosed aspect of reproductive health, with semen analysis serving as the cornerstone of clinical evaluation. To address this problem, this study investigates the use of machine learning algorithms to classify male fertility status based on key semen parameters, i.e., sperm concentration, motility, and morphology, using the VISEM dataset. This dat…", "authors": "Shahnawaz Qureshi, Raja Khurram Shahzad, Muhammad Fozan, Emal Kawal", "published": "2026-07-0 good! And that's not exactly true. Even though, for oil, there's barely any people who see how bad things are (I …"}, {"author": "trimethylpurine", "text": "No response. You don't want to take back the bad faith accusation at least? I could definitely and more rightfully accuse you now. Right? Good faith and all that? Honest take, you're angry that you didn't know that the FDA relied on research that wasn't peer reviewed, that they are still hiding the results from that st…"}, {"author": "ch4s3", "text": "I disagree. They're simply engaging in culture war posturing where socialism is simply a byword for \"bad people\". They call democrats socialists and argue for nationalizing OpenAI and some steel mills. They aren't for the free market, they're just dumb. Marjorie Taylor Greene typifies this kind of behavior."}, {"author": "trimethylpurine", "text": "The seemingly higher incidence for placebo when compared with MMR can be explained. 1. First, the placebo data comes from an article that doesn't meet several academic standards for peer reviewed research. The researchers were the reviewers and they all work at Pfizer. So, peer review was not done at all. AND the resul…"}, {"author": "preg_match", "text": "Yes, this is bad faith plainly and any reasonable person will agree. You’re choosing to simply ignore a lot of stuff so your conclusions make sense. You’re ignoring the placebo group entirely. Why does that matter? injecting even a placebo has high rate of adverse effects . The injection mechanism itself is not free - …"}, {"author": "Planktonne", "text": "\"Finding a bunch of old vulnerabilities\" is still several steps away from bringing a nation to its knees."}], "discussion_summary": "", "tags": []}, {"title": "The AirPods Effect", "url": "https://www.theescapenewsletter.com/p/the-airpods-effect", "summary": "", "points": 447, "comments": 794, "hn_url": "https://news.ycombinator.com/item?id=48592832", "published": "2026-06-18", "top_comments": [{"author": "multjoy", "text": "Lol, I've held a bike licence for over a decade, riding in the busiest cities in the UK."}, {"author": "norome", "text": "actually i can say that most people with a book and no headphones are the most ready to have a chat about what they're reading and beyond."}, {"author": "norome", "text": "I choose to embody the society i would rather live in, instead of following along with the friendlessness and disconnection that results from our deteriorated social sphere. Most people are delighted to have a little contact."}, {"author": "norome", "text": "I think HN probably oversamples for people who like to be left alone, which I get. When I talk to strangers it's pretty easy to detect who would be open based on their clothing choices and body language."}, {"author": "norome", "text": "It's actually funny if you talk to a lot of people, to see that so many are really excited to have a real, random little chat or comment. Even funnier is seeing the rare people who have completely forgotten the small pleasures of living among others."}], "discussion_summary": "", "tags": []}, {"title": "Professor denounces mass AI fraud on an exam at Brown", "url": "https://english.elpais.com/education/2026-06-28/ai-fraud-at-brown-university-academic-integrity-is-at-risk.html", "summary": "", "points": 557, "comments": 729, "hn_url": "https://news.ycombinator.com/item?id=48708991", "published": "2026-06-28", "top_comments": [{"author": "alsetmusic", "text": "A strong argument for reform. The costs of higher education have multiplied while the people providing the education have probably not moved meaningfully, or may have declined with inflation. All that money going to management and other executive corporate positions should be clawed back. How can a person enter a contr…"}, {"author": "jyounker", "text": "Sounds like you remember that person because they were exceptional. That doesn't make them a good argument for the general case."}, {"author": "jyounker", "text": "Smooth curving lines connecting into each other are very different from intersecting straight lines with clear stopping and starting points."}, {"author": "jyounker", "text": "So how does that change what's practical with regards to testing at major universities or high schools? The things that were possible then are still possible now."}, {"author": "forgetfreeman", "text": "Right and wrong. I am of a generation before common keyboard usage. As far as writers cramp goes, we all got it from time to time. At worst it was a minor nuisance compared to the skinned knees, bruises, and occasional broken bone that we racked up recreationally."}], "discussion_summary": "", "tags": []}, {"title": "Norway imposes near ban on AI in elementary school", "url": "https://www.reuters.com/technology/norway-imposes-near-ban-ai-elementary-school-2026-06-19/", "summary": "", "points": 823, "comments": 588, "hn_url": "https://news.ycombinator.com/item?id=48600093", "published": "2026-06-19", "top_comments": [{"author": "ndriscoll", "text": "Right now at least, if empirical testing shows poor results and anecdotal usage shows great ones, I'd say that in fact anecdotal evidence holds much more weight. The empirical testing is just bad. So you make it demonstrate the ground facts. Show formal proofs, link to and reference specific documents and fragments in …"}, {"author": "FloorEgg", "text": "It's not just being ignored, I was down voted and argued with for trying to make this point."}, {"author": "bendriv", "text": "The post from my feed: https://davidepstein.substack.com/p/how-to-use-chatgpt-witho... , with the corresponding article: https://arxiv.org/abs/2506.08872"}, {"author": "bendriv", "text": "Completely agree, and I think outsourcing critical thinking to AI is a bad idea for learning. Here is one study that researched AI assistance in a writing/learning context: https://arxiv.org/abs/2506.08872 . The teachers that have instructed using AI for assistance in our school seems focused on teaching how to technic…"}, {"author": "spwa4", "text": "... and teachers will just not do this. So maybe having AI grade a million tests instead can help. I mean is this being done to help kids? Or to protect the jobs of teachers who have no real interest in teaching?"}, {"author": "insane_dreamer", "text": "> what you're asking is the impact of undoing this I was being sarcastic. But this could become a serious question: in the (near) future, if academic skills no longer matter for the vast majority of jobs, then the State's responsibility to fund public education will be called into question -- maybe it would stop at 14 …"}], "discussion_summary": "", "tags": []}, {"title": "Sixty percent of US consumers say 'AI' in brand messaging is a turnoff", "url": "https://wpvip.com/future-of-the-web-2026/", "summary": "", "points": 1084, "comments": 577, "hn_url": "https://news.ycombinator.com/item?id=48569278", "published": "2026-06-17", "top_comments": [{"author": "HumblyTossed", "text": "Wrong. Most people would definitely _prefer_ the artisanal chair. However, they can't _afford_ the artisanal chair so they _settle_ for the IKEA chair."}, {"author": "HumblyTossed", "text": "They don't care. They only care about the metrics they were told to meet. They were told reduce headcount and use AI. So that's what they do and they have a spreadsheet to justify the numbers. A lot of times, in management, your goals are conflicting. You're only choice is to maximize them as best you can. If you don't…"}, {"author": "aurareturn", "text": "I should have defined it as the average professional worker. That said, I'm surprised that I'm not too far off. I'd bet if they include all LLM usage such as Google search summaries, it's close to daily."}, {"author": "philipallstar", "text": "I'm sure. But if he were American he'd rather than car industry started in America than in China, though. And he could afford a car himself and improve his own lifestyle."}, {"author": "0ckpuppet", "text": "Give  was token spend charts, then we’re told token spend is stupid so they create some aggregate metric of cost per line of code that also tells us nothing of actual customer value. It’s wild to me how at that level there’s zero repercussions"}, {"author": "Grimblewald", "text": "I might not use all the same terms as you, but i largly agree. However llms live in a world almost entierly divorced from our own. Ours is physical, it's is human information corpi. For tasks suited to its world, and llm is as \"human\" as I am in my own domain. Same same but different. Intelligence is a fundamental trai…"}], "discussion_summary": "", "tags": []}, {"title": "Not everyone is using AI for everything", "url": "https://gabrielweinberg.com/p/people-are-consuming-ai-like-they", "summary": "", "points": 512, "comments": 546, "hn_url": "https://news.ycombinator.com/item?id=48527700", "published": "2026-06-14", "top_comments": [{"author": "tmcdos", "text": "Or just say that you do not know the answer - but have the capacity to find it."}, {"author": "1vuio0pswjnm7", "text": "https://web.archive.org/web/20260524104824if_/https://news.y... \"followed up by someone with 5k karma\" Incorrect. Maybe the reply was made in haste Anytime a comment of mine receives lots of upvoites thare will always be some snarky replies. It's almost guaranteed These will sometimes include personal attacks Note all …"}, {"author": "joks", "text": "I don't think they want more people to see them."}, {"author": "ltononro", "text": "It's hard right now. I've been interviewing some folks for a while. I am really interested how someone can make a 100x of themselves when working. This often means \"how are you using claude code\", \"what is your coding setup\", \"how do you decide if your agent is going in the right direction or not w/o looking directly a…"}], "discussion_summary": "", "tags": []}], "blogs": [{"title": "Specification-driven composition for flexible data workflows", "url": "https://aws.amazon.com/blogs/architecture/specification-driven-composition-for-flexible-data-workflows/", "summary": "Specification-driven composition addresses a common scalability bottleneck in data pipelines. Data pipelines often start as simple scripts, but as they grow, you duplicate transformation logic and small changes cascade across multiple workflows. Copying and modifying data transformation logic across scripts leads to workflows that become difficult to manage at scale. Tracking what each pipeline do…", "blog": "AWS Architecture Blog", "published": "2026-07-09", "tags": ["warstory"]}, {"title": "S&P Global’s innovative disaster recovery strategy using Amazon FSx for NetApp ONTAP snapshots", "url": "https://aws.amazon.com/blogs/architecture/sp-globals-innovative-disaster-recovery-strategy-using-amazon-fsx-for-netapp-ontap-snapshots/", "summary": "In this post, we explain how S&amp;P Global Market Intelligence implemented an innovative disaster recovery solution for their Capital IQ platform using Amazon FSx for NetApp ONTAP. This solution enables immediate failover to read-only mode in a secondary region within 15 minutes, followed by full read-write recovery when needed. This approach achieves reduction in failover time while maintaining …", "blog": "AWS Architecture Blog", "published": "2026-07-07", "tags": []}, {"title": "Improving Smart Tiered Cache for Public Cloud Regions", "url": "https://blog.cloudflare.com/smart-tiered-cache-for-public-clouds/", "summary": "Smart Tiered Cache allows for precise upper tier selection for origins hosted on AWS, GCP, Azure, and Oracle Cloud with customer-provided cloud region hints.", "blog": "Cloudflare Blog", "published": "2026-07-10", "tags": []}, {"title": "Why we cannot wait for better post-quantum signature algorithms", "url": "https://blog.cloudflare.com/ml-dsa-will-have-to-do/", "summary": "NIST is advancing nine new post-quantum signature algorithms as potential candidates for future standardization. We take a closer look at all of them, and argue that while they are in the works and show great potential, we should use ML-DSA for now — the best one currently available.", "blog": "Cloudflare Blog", "published": "2026-07-09", "tags": []}, {"title": "Introducing Meerkat: an experiment in global consensus", "url": "https://blog.cloudflare.com/meerkat-introduction/", "summary": "Cloudflare Research is building a global consensus service called Meerkat that uses a new consensus algorithm called QuePaxa. We plan to use Meerkat to build a strongly consistent, fault-tolerant key-value store, and other applications.", "blog": "Cloudflare Blog", "published": "2026-07-08", "tags": []}, {"title": "Cloudflare proudly joins the UK government's Cyber Resilience Pledge", "url": "https://blog.cloudflare.com/cloudflare-joins-uk-cyber-resilience-pledge/", "summary": "The pledge is a voluntary framework inviting organizations to commit to foundational cyber security governance, board-level accountability, and supply chain rigor. For over a decade, Cloudflare has pioneered the core pillars of this framework: democratizing security, leadership accountability, and radical transparency.", "blog": "Cloudflare Blog", "published": "2026-07-07", "tags": []}, {"title": "Your Worker can now have its own cache in front of it", "url": "https://blog.cloudflare.com/workers-cache/", "summary": "We are launching Workers Cache, a regionally tiered cache that sits directly in front of your Worker entrypoints. Infinitely composable, configured via standard HTTP headers", "blog": "Cloudflare Blog", "published": "2026-07-06", "tags": []}, {"title": "Experiences with local models for coding", "url": "https://martinfowler.com/articles/exploring-gen-ai/local-models-for-coding-experiences.html", "summary": "Birgitta B&#xF6;ckeler now reports on her recent experiences trying local LLMs for coding. She compares them using two standard tasks, and tries out the most promising model for day-to-day use. more…", "blog": "Martin Fowler", "published": "2026-07-08", "tags": []}, {"title": "Viability of local models for coding", "url": "https://martinfowler.com/articles/exploring-gen-ai/local-models-for-coding-factors.html", "summary": "Birgitta B&#xF6;ckeler recently spent some time trying out running local LLMs for some programming tasks. In this memo she outlines the factors that influence how viable they are for the job. more…", "blog": "Martin Fowler", "published": "2026-07-07", "tags": []}, {"title": "Fragments: July 6", "url": "https://martinfowler.com/fragments/2026-07-06.html", "summary": "Last week, Thoughtworks ran a second Future of Software Development Retreat , this time in Europe. As with the previous event, I’ll be sharing some fragmentary thoughts on this. There were five parallel streams, so I could, at best, only attend ⅕ of sessions. This isn’t an event that forms conclusions, rather one that allows those exploring to share what they’ve found, and their visions for the fu…", "blog": "Martin Fowler", "published": "2026-07-06", "tags": []}, {"title": "Slack Introduces Agent Driven End-to-End Testing to Improve Resilience in UI Test Automation", "url": "https://www.infoq.com/news/2026/07/slack-agentic-e2e-testing-ui/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Agentic testing is an AI-driven approach to end-to-end test automation introduced by Slack engineering. It uses AI agents that execute workflows based on intent rather than fixed scripts, adapting to UI and system changes at runtime. The approach aims to reduce brittle tests in distributed systems while complementing deterministic unit, integration, and E2E testing strategies. By Leela Kumili", "blog": "InfoQ Architecture & Design", "published": "2026-07-10", "tags": ["agents"]}, {"title": "Article: Trade-Offs in Multi-Region Architectures: Latency vs. Cost", "url": "https://www.infoq.com/articles/multi-region-latency-cost-tradeoffs/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Adding cloud regions changes latency and cost in ways simple math can't capture. This article presents a framework from multiple launches: decompose your latency budget before committing to infrastructure, choose deployment patterns by consistency and traffic profile, and optimize before expanding. A phased approach cut latency 35% through routing alone, before a new region brought it under 60ms. …", "blog": "InfoQ Architecture & Design", "published": "2026-07-10", "tags": ["warstory"]}, {"title": "How Datadog Used Claude and Cursor for Test-Driven Production Migration", "url": "https://www.infoq.com/news/2026/07/datadog-ai-production-migration/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "In a recent article, Datadog engineer Arnold Wakim shared what worked, what didn't, and the lessons they learned while evolving a critical production system using AI to overcome hard limits in its storage backend and significantly improve performance. By Sergio De Simone", "blog": "InfoQ Architecture & Design", "published": "2026-07-10", "tags": ["warstory"]}, {"title": "Article: Beat-Aligned Mobile Audio Streaming with Virtual Chunks and Native Playback", "url": "https://www.infoq.com/articles/android-beat-aligned-mobile-audio-streaming/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "In this article, I describe the challenges and the design of a React Native real-time mobile beat-aligned playback system for iOS and Android. The system combines personalization with low-latency, and seamless navigation and was the result of careful analysis and experimentation to address strict mobile and network constraints as well as meet user expectations. By Vladyslav Melnychenko", "blog": "InfoQ Architecture & Design", "published": "2026-07-09", "tags": []}, {"title": "AlloyDB Ships Proxy Models That Replace LLM Calls with Local Inference inside the Database", "url": "https://www.infoq.com/news/2026/07/alloydb-ai-proxy-models/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Google shipped AlloyDB AI functions GA with a proxy model architecture that trains a lightweight local model from LLM outputs, then runs queries at database speed without external calls. Smart batching delivers 2,400x throughput improvement. The proxy model reaches 100,000 rows per second in preview, but benchmark numbers apply only to ai.if in internal testing. By Steef-Jan Wiggers", "blog": "InfoQ Architecture & Design", "published": "2026-07-09", "tags": []}, {"title": "AWS Details How One Customer Scaled to One Million Lambda Functions", "url": "https://www.infoq.com/news/2026/07/aws-lambda-1m/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "AWS has outlined how ProGlove, an industrial-wearables manufacturer, was able to scale its SaaS platform to run more than one million AWS Lambda functions spread across thousands of dedicated customer accounts. By Matt Foster", "blog": "InfoQ Architecture & Design", "published": "2026-07-09", "tags": ["warstory"]}, {"title": "Airbnb Shares Architecture behind Sitar-Agent Dynamic Configuration Sidecar for Kubernetes Services", "url": "https://www.infoq.com/news/2026/07/sitar-agent-sidecar-config/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Airbnb engineers detailed Sitar-agent, a Kubernetes sidecar for dynamic configuration delivery across tens of thousands of pods, processing updates several times per minute. The system was redesigned with Java, Amazon S3 snapshot bootstrapping, and a migration from Sparkey to SQLite to improve reliability, startup performance, and configuration availability at scale. By Leela Kumili", "blog": "InfoQ Architecture & Design", "published": "2026-07-08", "tags": ["agents", "warstory"]}, {"title": "Switching from PostgreSQL to ClickHouse for Improved Performance and Scalability", "url": "https://www.infoq.com/news/2026/07/momentic-postgres-clickhouse/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Momentic, the company behind an AI-driven software testing platform, recently rearchitected its caching system to handle over 2 million queries per day across 20 billion total entries, while maintaining an average response latency of around 250 ms. This improvement was made possible by transitioning from PostgreSQL to the column-oriented database ClickHouse. By Sergio De Simone", "blog": "InfoQ Architecture & Design", "published": "2026-07-07", "tags": []}, {"title": "Java News Roundup: Strict Field Initialization, GlassFish, GraalVM, JReleaser, RefactorFirst", "url": "https://www.infoq.com/news/2026/07/java-news-roundup-jun29-2026/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "This week's Java roundup for June 29th, 2026, features news highlighting: a new JEP candidate, Strict Field Initialization; point releases of GraalVM, JReleaser, RefactorFirst and Java Operator SDK; maintenance releases of GlassFish and Micronaut; the second milestone release of Grails 8.0; and the beta release of Open Liberty 26.0.0.7. By Michael Redlich", "blog": "InfoQ Architecture & Design", "published": "2026-07-06", "tags": []}, {"title": "Netflix Cuts Cassandra Read Latency from Seconds to Milliseconds with Dynamic Partition Splitting", "url": "https://www.infoq.com/news/2026/07/netflix-cassandra-partition/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Netflix engineers introduced dynamic partition splitting for Cassandra to address wide partitions in time series workloads. The metadata-driven approach detects oversized partitions, splits them smaller units, and routes reads across child partitions. Netflix reported lower read latency from seconds to milliseconds, reduced timeouts, and improved cluster stability while maintaining transparency. B…", "blog": "InfoQ Architecture & Design", "published": "2026-07-06", "tags": ["warstory"]}, {"title": "Cloudflare and AWS Embed x402 Agent Payments at the Edge", "url": "https://www.infoq.com/news/2026/07/cloudflare-aws-x402-micropayment/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Cloudflare and AWS both implemented x402 stablecoin micropayments at their edge networks within two weeks. The open protocol under the Linux Foundation revives HTTP 402 for agent-to-service payments with sub-cent transaction costs. Coinbase reports 169 million transactions in year one. Enterprise tax and invoicing gaps remain unresolved. By Steef-Jan Wiggers", "blog": "InfoQ Architecture & Design", "published": "2026-07-06", "tags": ["agents"]}, {"title": "AWS Introduces Amazon S3 Annotations", "url": "https://www.infoq.com/news/2026/07/aws-s3-annotations/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "AWS recently announced Amazon S3 Annotations, a feature that lets teams attach rich, searchable context such as summaries, classifications, compliance data, or AI-generated insights directly to S3 objects. Annotations can be updated independently of the object and queried across datasets, reducing the need for separate metadata systems. By Renato Losio", "blog": "InfoQ Architecture & Design", "published": "2026-07-05", "tags": []}, {"title": "Claude Reaches GA on Microsoft Foundry: European Enterprises Cannot Deploy It", "url": "https://www.infoq.com/news/2026/07/claude-foundry-ga-europe/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Claude models reached GA on Microsoft Foundry with Azure-native billing and governance, but no European data zone exists. Anthropic's own documentation confirms data residency guarantees apply to Bedrock and Vertex AI but not Foundry. European practitioners from banking and healthcare report the offering is unapproved for production. By Steef-Jan Wiggers", "blog": "InfoQ Architecture & Design", "published": "2026-07-05", "tags": []}, {"title": "Better tools made Copilot code review worse. Here&#8217;s how we actually improved it.", "url": "https://github.blog/ai-and-ml/github-copilot/better-tools-made-copilot-code-review-worse-heres-how-we-actually-improved-it/", "summary": "How migrating Copilot code review to shared Unix-style code exploration tools reduced review cost by reshaping agent workflows around pull request evidence. The post Better tools made Copilot code review worse. Here&#8217;s how we actually improved it. appeared first on The GitHub Blog .", "blog": "The GitHub Blog (Engineering)", "published": "2026-07-10", "tags": ["agents", "warstory"]}, {"title": "Automating cross-repo documentation with GitHub Agentic Workflows", "url": "https://github.blog/ai-and-ml/github-copilot/automating-cross-repo-documentation-with-github-agentic-workflows/", "summary": "Explore how the Aspire team turns merged product changes into SME-reviewed docs pull requests, closing the gap between release and documentation. The post Automating cross-repo documentation with GitHub Agentic Workflows appeared first on The GitHub Blog .", "blog": "The GitHub Blog (Engineering)", "published": "2026-07-08", "tags": ["agents"]}]}}, "DOCS": {"morning": "# AI/ML Morning Brief\n\n**Week of Jul 5, 2026**\n\n## 1) AI Architecture — Top Developments\n\n- **Cloudflare postmortem:** BYOIP pipeline change withdrew 25% of customer BGP prefixes; \"fail small\" re-architecture underway. [Cloudflare](https://blog.cloudflare.com/cloudflare-outage-february-20-2026/)\n- **Netflix ships \"Upper\" metamodel** — unified data architecture enforcing consistency across content-engineering services. [InfoQ](https://www.infoq.com/news/2025/12/netflix-upper-uda-architecture/)\n- **\"Code as the harness\" gains ground** — wrap agents in executable/verifiable/stateful scaffolding, not bigger prompts. [arXiv](https://arxiv.org/pdf/2605.18747)\n- **Incident-comms benchmark:** Pragmatic Engineer flags Cloudflare's postmortem as the gold standard. [Pragmatic Engineer](https://blog.pragmaticengineer.com/the-pulse-cloudflare-takes-down-half-the-internet/)\n\n## 2) AI Agents — Key News\n\n- **Microsoft \"Frontier\"** — new AI-deployment company; $2.5B, 6,000 experts, enterprise rollouts. [TechCrunch](https://techcrunch.com/2026/07/02/microsoft-launches-its-own-ai-deployment-company-with-2-5-billion-commitment/)\n- **NVIDIA × ServiceNow** — autonomous enterprise agents launched. [NVIDIA](https://blogs.nvidia.com/blog/servicenow-autonomous-ai-agents-enterprises/)\n- **Anthropic Claude Sonnet 5** live (Jun 30); default for Free/Pro Jul 1. [BuildFast](https://www.buildfastwithai.com/blogs/ai-news-today-july-1-2026)\n- **OpenClaw** — self-extending agent tops GitHub star charts; ClawHub 13k+ skills; supply-chain risk flagged. [GitHub](https://github.com/openclaw/openclaw)\n- **Theme:** demos → workflow replacement; \"Super Agents\" unify siloed agents (Levi's). [PYMNTS](https://www.pymnts.com/news/artificial-intelligence/2026/super-agents-are-connecting-what-enterprise-software-kept-separate/)\n\n## 3) Hugging Face Daily Papers — Top Highlights\n\n- **Scaling the Horizon, Not the Parameters** — trillion-param performance from a 35B agent. [HF](https://huggingface.co/papers/trending)\n- **TACO** — Tool-Augmented Credit Optimization for agentic tool use. [HF](https://huggingface.co/papers/trending)\n- **MIMFlow** — masked image modeling + normalizing flows for end-to-end image gen. [HF](https://huggingface.co/papers/trending)\n- **Volume:** ~20 trending/day, 612 for the month. [HF Papers](https://huggingface.co/papers)\n\n## 4) AI Investments — Major Funding\n\n- **Together AI** — $800M Series C, ~$8.3B post-money; Amazon, Aramco, Blackstone in. [Tech Startups](https://techstartups.com/2026/07/02/venture-capital-startup-funding-roundup-july-2-2026/)\n- **Quantum Systems** — $1.2B Series D (Jul 2); defense/autonomous, Munich. [Funding News](https://blog.mean.ceo/ai-startup-funding-news-july-2026/)\n- **Macro:** H1'26 global VC record $510B, AI-led; Q1 ~$300B. [Crunchbase](https://news.crunchbase.com/venture/record-breaking-funding-ai-global-q1-2026/)\n\n## 5) Impact of AI on the Stock Market — Market Moves\n\n- **Chips:** AI semi complex +$2T value YTD; SOX +47% YTD. [Intellectia](https://intellectia.ai/blog/ai-semiconductor-stocks-rally-july-2026)\n- **NVDA:** Q1 FY27 rev $81.6B (+85% YoY); nearing 52-wk high; leadership broadening. [Zacks](https://www.zacks.com/stock/news/2916674/nvidia-shares-rally-toward-52-week-high-buy-more-or-lock-in-gains)\n- **MU:** HBM sold out for 2026; ~$1,089 record (+700% YoY, +11% wk). [StocksDownUnder](https://stocksdownunder.com/why-micron-stock-is-surging-sold-out-ai-memory/)\n- **AMD / QCOM:** double-digit surges; BofA lifts semi TAM to $1.3T. [Intellectia](https://intellectia.ai/blog/ai-semiconductor-stocks-rally-july-2026)\n\n## 6) Curated Technical AI/ML Papers\n\n- **Jun 2026 — Code as Agent Harness** — [2605.18747](https://arxiv.org/pdf/2605.18747) — Survey: code as executable/verifiable/stateful scaffolding for reliable agents.\n- **Jun 2026 — Coding Benchmarks Are Misaligned with Agentic SWE** — [2606.17799](https://arxiv.org/pdf/2606.17799) — Argues popular benchmarks miss what real agentic engineering requires.\n- **Jun 2026 — Layer-Isolated Evaluation** — [2606.11686](https://arxiv.org/pdf/2606.11686) — No-LLM, regression-locked harness gating a production LLM agent.\n- **Apr 2026 — Autonomous Debugging + Dynamic Analysis** — [2604.24212](https://arxiv.org/pdf/2604.24212) — Debugging agents reason over runtime behavior, not just source.\n- **Jan 2026 — Bug-Reproduction Test Cogeneration** — [2601.19066](https://arxiv.org/pdf/2601.19066) — Generates a failing repro test alongside each agent-produced fix.\n- **Jul 2025 — SWE-Exp** — [2507.23361](https://arxiv.org/pdf/2507.23361) — Issue-resolution agents accumulate experience across tasks instead of starting cold.\n\n---\n*Sources: web search, Jul 5 2026. Dates approximate to publication month.*\n", "strategy": "# ↗ Strategy Signals — Talking Points for the Room\n\n**For having a say in your company's AI strategy.** Concise, sourced signals framed as *what to raise* with leadership — not just news.\n\n## Where the money says the puck is going\n\n- **Enterprise agents move from demos to deployment** — Microsoft stood up a $2.5B \"Frontier\" org purely to *deploy* enterprise AI. Signal: the bottleneck is now integration + rollout, not model access. *Raise:* are we resourcing deployment/ops, not just pilots? [TechCrunch](https://techcrunch.com/2026/07/02/microsoft-launches-its-own-ai-deployment-company-with-2-5-billion-commitment/)\n- **Agents get embedded in systems of record** — NVIDIA × ServiceNow shipped autonomous enterprise agents. *Raise:* which of our workflows are agent-ready, and who owns guardrails? [NVIDIA](https://blogs.nvidia.com/blog/servicenow-autonomous-ai-agents-enterprises/)\n- **\"Super Agents\" unify siloed tools** — Levi's is connecting per-function agents into one interface. *Raise:* do we have an agent-integration layer, or N disconnected copilots? [PYMNTS](https://www.pymnts.com/news/artificial-intelligence/2026/super-agents-are-connecting-what-enterprise-software-kept-separate/)\n\n## Infra & cost reality (your retrieval/serving lens)\n\n- **Inference infra is where capital is flowing** — Together AI raised $800M. *Raise:* build vs. buy for our serving/retrieval stack. [Tech Startups](https://techstartups.com/2026/07/02/venture-capital-startup-funding-roundup-july-2-2026/)\n- **Memory is the constraint** — HBM sold out for 2026; semiconductor TAM lifted toward $1.3T. *Raise:* capacity-plan index growth and GPU memory now, not Q4. [Intellectia](https://intellectia.ai/blog/ai-semiconductor-stocks-rally-july-2026)\n\n## Adoption pattern worth copying\n\n- **Winners map one messy process, add human review, prove time/error savings** — then expand. *Raise:* pick one high-friction workflow and instrument it before scaling AI across teams. [Agentic.ai](https://agentic.ai/news)\n\n## What to advocate internally (your edge)\n\n- **Eval harnesses before autonomy** — gate agents with regression-locked, no-LLM tests.\n- **Retrieval cost controls** — hybrid search + rerank budgets; measure tokens per resolved query.\n- **Guardrails on agent PRs** — treat autonomous code changes as a review/attack surface.\n\n---\n*Signals as of the week of the digest; refreshed weekly. Frame these as questions in strategy discussions, not conclusions.*\n", "playbook": "# 🛠 AI Engineering Playbook\n\n**How to get the most from AI in software engineering** — concrete, tested moves for cutting cost, shipping faster, and keeping output trustworthy. Grounded in current best practices and real practitioner reports from this week's HN threads.\n\n## Cut token usage (and cost)\n\n- **Turn on prompt caching** — Anthropic caching bills cached input at ~0.1x (a 90% discount) and now auto-caches multi-turn chats. Biggest single lever for repeated context. [Token Optimize](https://www.tokenoptimize.dev/guides/llm-token-optimization-strategies)\n- **Compact mid-session** — use summarize/compaction so the context window doesn't grow unbounded; a long session gets squeezed into a compact recap. [Redis](https://redis.io/blog/llm-token-optimization-speed-up-apps/)\n- **Persist memory across sessions** — curated memory turns a 50K-token reload into a few hundred tokens. Have the agent maintain its own `plan.md`/docs so it isn't reliant on one session's context. [Token Optimize](https://www.tokenoptimize.dev/guides/context-engineering-reduce-token-usage)\n- **Compress & mask tool output** — logs, files, and RAG chunks compress 60–95% before hitting the model; mask irrelevant tool results instead of pasting them whole. [CoddyKit](https://www.coddykit.com/pages/blog-detail?id=512865&slug=how-to-cut-llm-token-usage-by-90-with-context-compression-a-step-by-step-guide)\n- **Retrieve, don't pack** — fetch only relevant chunks on demand from a vector store rather than stuffing the whole history in the prompt. [LogRocket](https://blog.logrocket.com/stop-wasting-ai-tokens-10-ways-to-reduce-usage/)\n- **Compile fuzzy calls into local functions** — for repeated LLM-API tasks (parse logs, repair JSON, rank by intent), compile the spec into a local \"fuzzy function\" to reclaim locality, reproducibility, and price. [Program-as-Weights](https://arxiv.org/abs/2607.02512)\n- **Minify agent state** — state-in-context agents shrink dramatically with minification/context-pruning. [Minification](https://arxiv.org/pdf/2606.01326) · [Context Pruning](https://arxiv.org/pdf/2605.15315)\n\n## Speed up feature development\n\n- **Plan before you code** — collapse ~20 ambiguous decisions into one reviewed spec so each lands near 100% instead of 80%. The cheapest speed-up there is. [Claude Code Docs](https://code.claude.com/docs/en/best-practices)\n- **Delegate to subagents** — a subagent explores in its own context and reports back a compressed summary, keeping the main session clean and fast (great for large read/exploration tasks). [SmartScope](https://smartscope.blog/en/generative-ai/claude/claude-code-best-practices-advanced-2026/)\n- **Chain the SDLC as skills** — brainstorm → worktree → implementation plan → subagent execution → TDD → review-before-merge (e.g., the \"Superpowers\" collection). [duet.so](https://duet.so/guides/claude-code-skills-complete-guide)\n- **Enforce TDD with hooks** — a deterministic red-green-refactor loop (write failing test → watch it fail → make it pass) via hooks/state machine yields regression-proof code; one HN dev built a 300k-line SaaS this way. [HN](https://news.ycombinator.com/item?id=48413629)\n- **Use a second model as reviewer** — several devs run Codex to review Claude Code output (or vice-versa) as a cheap quality gate. [HN](https://news.ycombinator.com/item?id=48413629)\n\n## Skills to add to a project (and how to manage them)\n\n- **Check skills into the repo** — keep them under `.agents/skills/`, versioned and reviewed via PR, so every contributor inherits the project's conventions automatically. [Developers Digest](https://www.developersdigest.tech/blog/best-claude-code-skills-2026)\n- **Keep 8–12, audit monthly** — that covers most of a senior dev's day; beyond that you pay a \"context tax.\" Delete any skill you haven't triggered in 30 days. [SmartScope](https://smartscope.blog/en/generative-ai/claude/claude-code-best-practices-advanced-2026/)\n- **Right tool for the job** — *Skills* = how to do something; *MCP* = access to external systems; *Subagents* = delegate to a specialist with its own context. [duet.so](https://duet.so/guides/claude-code-skills-complete-guide)\n- **High-ROI starter skills:** branch/PR review, test generation, CI/CD setup, spec-driven scaffolding, incident triage, changelog/release notes, and a repo-conventions linter.\n\n## Keep AI output trustworthy\n\n- **Treat the agent as a fallible teammate** — extensive unit/automation tests, static analysis (e.g., SonarQube), and CI gates on everything merged to main. [HN](https://news.ycombinator.com/item?id=48445024)\n- **Guard the review surface** — autonomous agents that ship code across many PRs are a real attack surface (a payload can be timed across commits); keep human review and CI gating tight. [Distributed Attacks in Persistent-State AI Control](https://arxiv.org/abs/2607.02514)\n- **Prefer deterministic scripts** — for repeatable ops (deploys, scaffolding), have the agent run pre-built scripts instead of improvising API calls, so results are consistent every time. [HN](https://news.ycombinator.com/item?id=48445024)\n\n## Manage context\n\n- **Rules close to the repo** — put project rules where the code lives; keep prompts short and task-specific rather than \"heroic\" mega-prompts. [HN](https://news.ycombinator.com/item?id=48445024)\n- **Watch for context bloat** — too much in context degrades output; lean context beats a kitchen-sink of skills/MCPs. [HN](https://news.ycombinator.com/item?id=48413629)\n\n## Anti-patterns to avoid\n\n- **Vibe coding without the rest of the software** — code isn't the whole product; skipping docs, tests, and design catches up fast.\n- **Skill hoarding** — untriggered skills/MCPs just tax your context window.\n- **Skim reviews** — pattern-skimming misses duplication, bloat, and inconsistent naming that quietly drain productivity.\n- **Burning tokens on non-AI work** — if a plain shell script does the job, automate it without the model.\n\n---\n*Sources: current best-practice guides + practitioner reports from this week's Hacker News threads and arXiv papers in your digest.*\n", "podcast": "# ◇ Story Desk — This Week's Angles\n\nAngles worth developing from this week's items — for a talk, a post, or a deep-dive. Each has a hook, an angle type, talking points, who to talk to, and a source. Biased toward retrieval, agents, and production reality.\n\n## 1. Seconds → milliseconds: Netflix's Cassandra latency fix  *(War Story · LEAD)*\nHook: a classic read-latency nightmare at scale — and the partitioning change that fixed it.\n- What caused seconds-long reads, and how they diagnosed it.\n- The partition/data-model change and its trade-offs.\n- What transfers to any large-index or vector store you run.\n- When to fix the data model vs. throw hardware at it.\nWho to talk to: an engineer who's run large stateful data stores. [InfoQ](https://www.infoq.com/news/2026/07/netflix-cassandra-partition/)\n\n## 2. Memory that survives the session: semantic persistence for LLM workflows  *(Tool/Workflow)*\nHook: RAG isn't just retrieval — it's persisting *workflow knowledge* so agents don't start cold.\n- \"Workflow as Knowledge\": what to persist and how to index it.\n- Where hybrid/semantic retrieval helps vs. hurts in agent memory.\n- Cost and staleness trade-offs of long-lived indexes.\nWho to talk to: a retrieval/RAG practitioner (your wheelhouse). [arXiv](http://arxiv.org/abs/2607.08740v1)\n\n## 3. Serving agents at scale: scheduling when every turn hits an LLM  *(War Story)*\nHook: agentic chat in production lives or dies on scheduling and tail latency.\n- SMetric's session-centric scheduling for serving agents.\n- Throughput vs. per-session fairness; what breaks under load.\n- Guardrails for cost blowups when agents loop.\nWho to talk to: an infra/serving engineer. [arXiv](http://arxiv.org/abs/2607.08565v1)\n\n## 4. Postgres → ClickHouse: when your database stops keeping up  *(War Story)*\nHook: the honest version of a migration story — why they switched and what it cost.\n- Signals it was time to move off Postgres.\n- What ClickHouse bought them, and the sharp edges.\n- How they de-risked the cutover.\nWho to talk to: an engineer who's led a datastore migration. [InfoQ](https://www.infoq.com/news/2026/07/momentic-postgres-clickhouse/)\n\n## 5. TDD with AI, for real: Datadog's test-driven production migration  *(Tool/Workflow)*\nHook: a concrete, reviewable way to use AI coding tools without \"vibe coding\" in prod.\n- The test-first loop that kept the migration safe.\n- Where human review stayed non-negotiable.\n- What made it repeatable vs. a one-off.\nWho to talk to: someone shipping AI-assisted migrations. [InfoQ](https://www.infoq.com/news/2026/07/datadog-ai-production-migration/)\n\n## 6. Latency vs. cost: the multi-region architecture trade-off  *(Architecture)*\nHook: the decision every scaling team faces, laid out with the real trade-offs.\n- What actually drives the latency/cost curve.\n- Patterns that fail quietly at multi-region scale.\n- A decision framework you can reuse Monday.\nWho to talk to: an architect who's run multi-region systems. [InfoQ](https://www.infoq.com/articles/multi-region-latency-cost-tradeoffs/)\n\n---\n**Lead with #1** — a concrete, high-stakes latency war story hooks engineers instantly and frames the whole \"production reality\" theme. #2 and #3 are your retrieval/agents depth plays.\n"}, "WEEK": "2026-07-11"};
const DIGEST = BUNDLE.DIGEST, DOCS = BUNDLE.DOCS;
const VIEWS = [
  { key: "morning",   label: "◉ Morning Brief",    type: "md",   doc: "morning" },
  { key: "retrieval", label: "⌕ Retrieval Desk",   type: "desk", tag: "retrieval" },
  { key: "agents",    label: "⛓ Agents in Prod",   type: "desk", tag: "agents" },
  { key: "warstory",  label: "⚠ War Stories",      type: "desk", tag: "warstory" },
  { key: "strategy",  label: "↗ Strategy Signals", type: "md",   doc: "strategy" },
  { key: "playbook",  label: "⚙ Playbook",         type: "md",   doc: "playbook" },
  { key: "podcast",   label: "◇ Story Desk",       type: "md",   doc: "podcast" },
];
const SRC_LABEL = { arxiv: "arXiv", blogs: "Blog", github: "GitHub", hackernews: "HN" };
let tab = "morning";
const esc = s => (s || "").replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));

function itemsByTag(tag) {
  const src = DIGEST.sources || {}; const out = [];
  for (const k of Object.keys(src)) for (const it of (src[k] || [])) if ((it.tags || []).includes(tag)) out.push({ it, src: k });
  return out;
}
function tabButton(v, count) {
  const div = document.createElement("div");
  div.className = "tab" + (v.key === tab ? " active" : "");
  div.innerHTML = v.label + (count != null ? ` <span class="count">${count}</span>` : "");
  div.onclick = () => { tab = v.key; renderTabs(); renderItems(); };
  return div;
}
function renderTabs() {
  const el = document.getElementById("tabs"); el.innerHTML = "";
  for (const v of VIEWS) {
    if (v.type === "desk") { const c = itemsByTag(v.tag).length; if (!c) continue; el.appendChild(tabButton(v, c)); }
    else el.appendChild(tabButton(v, null));
  }
}
function mdToHtml(md) {
  const lines = (md || "").replace(/\r/g, "").split("\n"); let html = "", inList = false;
  const inline = s => esc(s).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\*(.+?)\*/g, "<em>$1</em>");
  const cl = () => { if (inList) { html += "</ul>"; inList = false; } };
  for (const raw of lines) { const line = raw.trimEnd();
    if (/^#{1,6}\s/.test(line)) { cl(); const lvl = line.match(/^#+/)[0].length; html += `<h${lvl} class="md-h">${inline(line.replace(/^#+\s/, ""))}</h${lvl}>`; }
    else if (/^---+$/.test(line)) { cl(); html += "<hr>"; }
    else if (/^[-*]\s/.test(line)) { if (!inList) { html += '<ul class="md-ul">'; inList = true; } html += `<li>${inline(line.replace(/^[-*]\s/, ""))}</li>`; }
    else if (line === "") { cl(); } else { cl(); html += `<p class="md-p">${inline(line)}</p>`; } }
  cl(); return html;
}
function badge(t) { return `<span class="badge">${esc(String(t))}</span>`; }
function deskCard(it, srcKey) {
  const title = `<a class="title" href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a>`;
  let meta = [`<span class="badge src">${esc(SRC_LABEL[srcKey] || srcKey)}</span>`];
  if (srcKey === "arxiv")  meta.push(badge(it.authors || "—"), badge(it.published));
  if (srcKey === "blogs")  meta.push(badge(it.blog || "blog"), badge(it.published || ""));
  if (srcKey === "github") meta.push(badge("★ " + (it.stars ?? 0)), badge(it.language || "—"));
  let extra = "";
  if (srcKey === "hackernews") {
    meta.push(badge((it.comments ?? 0) + " comments"), `<a class="badge" href="${esc(it.hn_url)}" target="_blank" rel="noopener">HN thread</a>`);
    if (it.discussion_summary) {
      const quotes = (it.top_comments || []).map(c => `<div class="quote">“${esc(c.text)}”<span class="who"> — ${esc(c.author)}</span></div>`).join("");
      extra = `<div class="disc"><div class="disc-h">💬 What people are saying</div><div class="disc-body">${esc(it.discussion_summary)}</div>${quotes}</div>`;
    }
  }
  const summary = it.summary ? `<div class="summary">${esc(it.summary)}</div>` : "";
  return `<div class="card">${title}${summary}${extra}<div class="meta">${meta.join("")}</div></div>`;
}
function renderItems() {
  const root = document.getElementById("content");
  const view = VIEWS.find(v => v.key === tab) || VIEWS[0];
  if (view.type === "md") {
    const md = DOCS[view.doc];
    root.innerHTML = md ? `<div class="brief">${mdToHtml(md)}</div>` : `<div class="empty">Not in this edition.</div>`;
    return;
  }
  const rows = itemsByTag(view.tag);
  root.innerHTML = rows.length ? rows.map(r => deskCard(r.it, r.src)).join("") : `<div class="empty">No items on this desk this week.</div>`;
}
document.getElementById("weeklabel").textContent = BUNDLE.WEEK ? "Week of " + BUNDLE.WEEK : "";
renderTabs(); renderItems();
</script>
