": "S. Aaron McClendon", "published": "2026-07-17", "tags": []}, {"title": "Frontier AI performance across the business disciplines: a case-grounded benchmark of knowledge work and analytical reasoning", "url": "http://arxiv.org/abs/2607.16057v1", "summary": "Large language models (LLMs) are improving rapidly as reflected in benchmark scores, yet these AI benchmarks largely test capabilities such as factual recall, narrow question answering, mathematical problem-solving, and coding and agentic tool-use. What remains poorly measured is AI progress on the analytical knowledge work white-collar professionals perform daily, including synthesizing complex i…", "authors": "Ajay Patel, Kartik Hosanagar, Ramayya Krishnan, Chris Callison-Burch", "published": "2026-07-17", "tags": []}, {"title": "Loop the Loopies!", "url": "http://arxiv.org/abs/2607.16051v1", "summary": "We present Loopie, the most powerful looped Transformer to date. The Loopie series consists of two Mixture-of-Experts (MoE) models: a 20B-parameter model with 2B active parameters and a 6Bparameter model with 0.6B active parameters. Looped Transformers have long faced a challenge: given an N-fold increase in pre-training compute, increasing the parameter count by a factor of N usually outperforms …", "authors": "Zitian Gao, Yilong Chen, Yihao Xiao, Xinyu Yang", "published": "2026-07-17", "tags": []}, {"title": "SciForge: An AI-Native, Multimodal Workbench for Scientific Discovery", "url": "http://arxiv.org/abs/2607.16038v1", "summary": "Scientific work increasingly spans heterogeneous artifacts -- papers, code, datasets, scientific file formats, model outputs, figures, manuscripts, and team decisions -- yet general-purpose AI assistants rarely preserve these objects as a coherent, auditable research state. We present SciForge, a multimodal research-native AI workbench that reserves the graphical interface for human judgment while…", "authors": " SciForge Team, Zhangyang Gao, Minghao Fang, Yifei Liu", "published": "2026-07-17", "tags": []}, {"title": "Revisiting data-driven dynamic security assessment with a tabular foundation model", "url": "http://arxiv.org/abs/2607.16031v1", "summary": "Data-driven pre-fault dynamic security assessment (DSA) rapidly evaluates the dynamic risk of credible contingencies on a power system using machine learning. Existing approaches face two limitations. First, they require a large labelled database for training, with a separate model trained, tuned, and maintained for each contingency in a potentially long list of credible contingencies. Second, the…", "authors": "Olayiwola Arowolo, Maosheng Yang, Jochen Cremer", "published": "2026-07-17", "tags": []}, {"title": "Rethinking Quantum Continual Learning with Quantum Fisher Information", "url": "http://arxiv.org/abs/2607.16030v1", "summary": "Quantum continual learning aims to train quantum models on sequential tasks without losing previously learned knowledge. However, variational quantum classifiers (VQCs) are prone to catastrophic forgetting under nonstationary task distributions. We propose quantum elastic weight consolidation (QEWC), a quantum Fisher information (QFI)-informed regularization method for mitigating forgetting. Unlik…", "authors": "Yu-Chao Hsu, Yu-Cheng Lin, Tai-Yue Li, Nan-Yow Chen", "published": "2026-07-17", "tags": []}, {"title": "DiffTestGen: Change-Directed LLM-Based Testing for Exposing Behavioral Differences", "url": "http://arxiv.org/abs/2607.16024v1", "summary": "As software evolves over time, it is important to ensure that any behavioral changes occur as intended by developers. A promising approach for this goal is to generate tests that expose behavioral differences between the old and new versions of a program. However, current approaches fail to trigger behavioral differences for many code changes. This paper presents~DiffTestGen, a novel change-direct…", "authors": "Huimin Hu, Cristian Cadar, Michael Pradel", "published": "2026-07-17", "tags": []}, {"title": e AI Trust Gap: The Case for Independent Certification for Trustworthy AI", "url": "http://arxiv.org/abs/2607.15992v1", "summary": "Over the past decade, responsible AI (RAI) has produced a substantial body of practice for identifying and mitigating the risks AI poses in high-stakes settings. Yet this work has not produced a market that rewards trustworthiness. Firms that invest seriously in safety, fairness, and oversight cannot consistently prove to consumers, regulators, and shareholders that their systems go beyond the bar…", "authors": "Trisevgeni Papakonstantinou, Cansu Canca, Farah Nanji, Waheedullah Pardess", "published": "2026-07-17", "tags": []}, {"title": "A Formally Grounded ODRL Evaluator: Implementation and Comparison", "url": "http://arxiv.org/abs/2607.15987v1", "summary": "The ODRL policy language is emerging as the de-facto standard for policy modelling data access and usage preferences, AI governance policies and data workflows in European dataspaces. The current standard has no mathematical formal semantics to describe how a system should implement policy evaluation. This has resulted in a variety of systems and tools that implement their own interpretation of th…", "authors": "Jaime Osvaldo Salas, Paolo Pareti, Adeel Aslam, Christopher Maidens", "published": "2026-07-17", "tags": []}, {"title": "Sociocultural Influences on Opinion Formation: Word of Mouth Dynamics, Mass Media and Behavioural Development", "url": "http://arxiv.org/abs/2607.15968v1", "summary": "We study a society of agents belonging to a number of occupational or cultural groups that form opinions about others' situation in the same or different group. Opinions develop either by observation within own group or by directly interacting with members of other groups, therefore by word of mouth (WoM). Additionally, global mass media (MM) may be available that inform indirectly about the situa…", "authors": "Elpida Tzafestas", "published": "2026-07-17", "tags": []}, {"title": "Rendering nguage of Security: How Prompt Syntax Shapes Secure Code Generation in Open LLMs", "url": "http://arxiv.org/abs/2607.15937v1", "summary": "Large Language Models (LLMs) are increasingly used for source code generation despite their outputs often exhibiting security vulnerabilities. Prior work shows that prompt engineering can mitigate such risks, yet (1) they focused on high-level prompting strategies, neglecting recent evidence that fine-grained syntactic variations can substantially alter model behavior; and (2) predominantly evalua…", "authors": "Matteo Cicalese, Antonio Della Porta, Stefano Lambiase, Emanuele Iannone", "published": "2026-07-17", "tags": []}, {"title": "A Modular Framework for Stack-Heap and Value Abstractions (Extended Version)", "url": "http://arxiv.org/abs/2607.15932v1", "summary": "Advanced static program analysis requires reasoning on the semantics of non-trivial program behaviors (e.g., pointers and complex data structures such as lists and sets, functions, and objects) and how they affect the memory. In most programming languages, static and dynamic allocations are typically managed by the stack and the heap, respectively. However, how allocations behave and how the memor…", "authors": "Giacomo Boldini, Luca Negrini, Luca Olivieri, Pietro Ferrara", "published": "2026-07-17", "tags": []}, {"title": "On the Failure of Boundary-Seeking Distillation in Bottlenecked Generative Architectures", "url": "http://arxiv.org/abs/2607.15919v1", "summary": "Data-free knowledge distillation transfers the knowledge encoded in a teacher model to a student model without access to the original training data. Prior work such as Contrastive Abductive Knowledge Extraction (CAKE) achieves this for classifiers by synthesizing samples near the teacher's decision boundary. In this work, we investigate whether this boundary-seeking principle extends to autoencode…", "authors": "Mohamed Amine Kina", "published": "2026-07-17", "tags": []}, {"title": "Trans-Domain Digita  "text": "I'm not sure how much does the total production of bicycles consume, but I don't see how it's relevant for the use."}, {"author": "customguy", "text": "it is simply one meaning of the word, and you talking about something else instead a waste of time."}, {"author": "abhinav_sk", "text": "Taking the context of raising children, the ‘unique contribution’ of a lot of parents is traumatising their kids. If it’s helping us make better decisions, I don’t see how that could be worse. I think that translates to all the non creative things you spoke about."}, {"author": "rmunn", "text": "Ah. When that one commenter said \"Wealth is having economic power over the people around you\", I ignored him, because that's a ridiculous definition, not to be taken seriously. Any argument that arises out of that definition is inherently flawed, since one of its premises is false; it would be like saying \"Since the mo…"}, {"author": "rmunn", "text": "I'm of the same opinion re: the bubble. The dotcom bubble held on longer than I thought it would (I had been predicting that it would burst in 1999), so I'm not sure I should be making predictions as to when the rental-LLM bubble will burst. But I'm sticking with the hardware I have until memory prices finally fall aga…"}], "discussion_summary": "", "tags": []}, {"title": "GLM 5.2 and the coming AI margin collapse", "url": "https://martinalderson.com/posts/the-upcoming-ai-margin-collapse-part-1-glm-5-2/", "summary": "", "points": 694, "comments": 469, "hn_url": "https://news.ycombinator.com/item?id=48809877", "published": "2026-07-06", "top_comments": [{"author": "ryukoposting", "text": "Reading Yegge's post made me crack a smile. He's beating the \"we need Kubernetes for agents!\" drum so damn hard and people aren't responding. I'm certain it's because 95% of the people he's talking to have no clue what Kubernetes actually does. They just know it's there. Hell, every time I type \"Kubernetes\" I'm reminde…"}, {"author": "gnarbarian", "text": "you don't know me very well lol. You're right of course when you're talking about people. I believe there is a lot of low-hanging fruit for optimizing the performance of these models. that's actually what my startup is doing."}, {"author": "Paradigma11", "text": "Because then people will just flock to open weight models that are even cheaper and Anthropic/OpenAI will go bankrupt. Then somebody will buy those companies for cents on the dollar and run a profitable token selling business for today's prices without doing any new research. New model releases will slow to a crawl but…"}, {"author": "rdbl27", "text": "The case of Sweden entirely falsifies the theory that \"it would've been much worse without government action.\" No government action whatsoever was taken in Sweden. None. Death rates were no better or worse than adjacent countries that intervened extensively. Ergo, government intervention was irrelevant one way or anoth…"}, {"author": "andriy_koval", "text": "I agree is that money is an issue, but not geo-boundaries. If EU decides to commit XXXB they may have a chance to catch up eventually."}, {"author": "ben_w", "text": "Great for us here in Europe, but an even bigger reason for Apple to be upset about it."}], "discussion_summary": "", "tags": []}, {"title": "The bottleneck might be the air in the room", "url": "https://blog.mikebowler.ca/2026/07/03/co2-and-decision-making/", "summary": "", "points": 833, "comments": 468, "hn_url": "https://news.ycombinator.com/item?id=48783117", "published": "2026-07-04", "top_comments": [{"author": "esikich", "text": "Cars are leaky as fuck. They are more leaky than your house. There is 0 potential of CO2 buildup that is anything remotely close to being harmful."}, {"author": "theshrike79", "text": "In these studies, are the people told that they have less CO2 in the air? My experience is more like being slightly drunk. If you know you need to be sharp (client meeting in a meeting room with shitty air), of course you can do it. But when you have a relaxed team meeting in the same room, the jokes start getting real…"}, {"author": "GreenWatermelon", "text": "And Here is the uncomfortable part: The LLM smell in your article is obvious. Not only will people notice, but they will severely denounce the article. Absolutely Shame."}, {"author": "GreenWatermelon", "text": "Myeter started tingling at \"Not the people. The room.\" On the first paragraph, and reached maximums level at the same part as you. Feels like I wasted time reading bullshit."}, {"author": "bloomingeek", "text": "True, but the vast amount of buildings don't have this technology."}, {"author": "cryptonector", "text": "Uh, no, homes should not be airtight. You'd have a hard time closing exterior doors if they were, and anyways, houses need to be able to \"breathe\" to be able to keep humidity down (you don't want mold problems), oxygen up, CO2 down, etc."}], "discussion_summary": "", "tags": []}], "blogs": [{"title": "Eclipse Dataspace Components on AWS: Cost optimization strategies", "url": "https://aws.amazon.com/blogs/architecture/eclipse-dataspace-components-on-aws-cost-optimization-strategies/", "summary": "When you deploy Eclipse Dataspace Components (EDC) connectors on AWS, one of the first challenges you face is predicting and controlling the cost of the required infrastructure. Without clear benchmarks, it is difficult to make informed decisions about workload sizing, environment configuration, and long-term investment. Part 1 of this 3-part blog series covered the fundamentals […]", "blog": "AWS Architecture Blog", "published": "2026-07-17", "tags": []}, {"title": "Eclipse Dataspace Components on AWS: Architecture patterns in production", "url": "https://aws.amazon.com/blogs/architecture/eclipse-dataspace-components-on-aws-architecture-patterns-in-production/", "summary": "Running Eclipse Dataspace Components (EDC) connectors in production on AWS requires deliberate architecture decisions around isolation, managed services, and security layering. In Part 1 of this series, we covered the fundamentals of data space architectures and EDC per the International Data Space Association’s (IDSA) standards. If you are new to EDC, we recommend starting there. […]", "blog": "AWS Architecture Blog", "published": "2026-07-17", "tags": []}, {"title": "Eclipse Dataspace Components on AWS: Data sharing fundamentals", "url": "https://aws.amazon.com/blogs/architecture/eclipse-dataspace-components-on-aws-data-sharing-fundamentals/", "summary": "This three-part blog series guides you through implementing Eclipse Dataspace Components (EDC) on AWS, from foundational concept to production deployment. Part 1 establishes the theoretical foundation with IDSA standards, the Dataspace Protocol (DSP), and core EDC architecture. Part 2 provides production-ready AWS deployment patterns using services like Amazon Elastic Container Service (Amazon ECS…", "blog": "AWS Architecture Blog", "published": "2026-07-17", "tags": []}, {"title": "Prioritize your AWS Health alerts using AWS User Notifications", "url": "https://aws.amazon.com/blogs/architecture/prioritize-your-aws-health-alerts-using-aws-user-notifications/", "summary": "If you run critical workloads on AWS, such as a contact center on Amazon Connect Customer, database workloads on Amazon Relational Database Service (Amazon RDS), or hybrid connectivity through AWS Direct Connect, service health events demand your attention. But not all events are equal. An operational issue, a scheduled maintenance window, and a deprecation notice […]", "blog": "AWS Architecture Blog", "published": "2026-07-16", "tags": []}, {"title": "How bitdrift scaled to 121 million concurrent gRPC connections on Amazon CloudFront for live telemetry sporting events", "url": "https://aws.amazon.com/blogs/architecture/how-bitdrift-scaled-to-121-million-concurrent-grpc-connections-on-amazon-cloudfront-for-live-telemetry-sporting-events/", "summary": "When 121 million mobile devices establish persistent gRPC connections to your origin infrastructure within seconds of a live broadcast, the routing policy behind your DNS records matters far more than it does at normal traffic levels. The wrong policy can concentrate all your connections onto a single origin endpoint, turning a scaling success into an […]", "blog": "AWS Architecture Blog", "published": "2026-07-15", "tags": ["warstory"]}, {"title": "How Mapfre USA modernized fraud claims with Amazon EMR Serverless", "url": "https://aws.amazon.com/blogs/architecture/how-mapfre-usa-modernized-fraud-claims-with-amazon-emr-serverless/", "summary": "Insurance fraud remains a significant challenge for the insurance industry because fraudulent claims can increase loss costs, reduce trust, and consume investigation capacity that could otherwise be focused on serving customers. Traditional fraud detection approaches typically rely on rules-based controls, manual investigation triggers, historical claim patterns, and structured-data-only analysis.…", "blog": "AWS Architecture Blog", "published": "2026-07-14", "tags": []}, {"title": "Unlocking the future of video data: March Networks cloud storage on AWS", "url": "https://aws.amazon.com/blogs/architecture/unlocking-the-future-of-video-data-march-networks-cloud-storage-on-aws/", "summary": "Enterprise video surveillance is operating at an unprecedented scale as organizations across retail, banking, quick-service restaurants (QSR), convenience stores, and transportation networks generate petabytes of video data across thousands of distributed locations. As retention requirements grow and organizations seek to extract more operational insights from video, traditional on-premise storage…", "blog": "AWS Architecture Blog", "published": "2026-07-13", "tags": []}, {"title": "In-House LLM Serving at Netflix", "url": "https://netflixtechblog.com/in-house-llm-serving-at-netflix-a5a8e799ea2c?source=rss----2615bd06b42e---4", "summary": "", "blog": "Netflix TechBlog", "published": "2026-07-17", "tags": []}, {"title": "Building Service Topology at Scale: Architecture, Challenges, and Lessons Learned", "url": "https://netflixtechblog.com/building-service-topology-at-scale-architecture-challenges-and-lessons-learned-f4b792f3f0d8?source=rss----2615bd06b42e---4", "summary": "", "blog": "Netflix TechBlog", "published": "2026-07-13", "tags": ["warstory"]}, {"title": "Cloudflare WAF protects WordPress applications from two high-severity vulnerabilities", "url": "https://blog.cloudflare.com/wordpress-vulnerabilities/", "summary": "Cloudflare has deployed two WAF rules in response to high-severity vulnerabilities disclosed to us by the WordPress security team. The new rules protect all Cloudflare customers using affected WordPress versions, but customers should still update immediately to a patched release", "blog": "Cloudflare Blog", "published": "2026-07-17", "tags": []}, {"title": "A broken DNSSEC rollover took down .al. Now 1.1.1.1 tells you when validation is bypassed", "url": "https://blog.cloudflare.com/dnssec-nta-ede-33/", "summary": "When a failed DNSSEC key rollover took down the .al TLD, we deployed a Negative Trust Anchor to restore resolution. This time, though, clients didn't have to take our word for it: 1.1.1.1 returned EDE 33, a new DNS error code that signals directly in the response that DNSSEC validation was bypassed.", "blog": "Cloudflare Blog", "published": "2026-07-14", "tags": ["warstory"]}, {"title": "Introducing Precursor: detecting agentic behavior with continuous client-side signals", "url": "https://blog.cloudflare.com/introducing-precursor/", "summary": "Precursor, our new continuous behavioral validation engine for bot management, offers visibility into how humans and bots actually interact across the full user journey. By turning session-level behavior into bot detection signals, it identifies advanced automation with higher precision — while reducing friction for legitimate users.", "blog": "Cloudflare Blog", "published": "2026-07-13", "tags": ["agents"]}, {"title": "The Archaeologist’s Copilot", "url": "https://martinfowler.com/articles/archaeologist-copilot.html", "summary": "When people think of legacy modernization, most folks aren't imagining the target environment will be Java 8. But this was the challenge facing Nik Malykhin when he needed to run a Java 1.5 codebase on today's hardware. His early use of LLMs gave plausible answers that did not hold up in the codebase. Progress came when he grounded the process in evidence, using AI to support analysis, validation …", "blog": "Martin Fowler", "published": "2026-07-16", "tags": []}, {"title": "DSLs Enable Reliable Use of LLMs", "url": "https://martinfowler.com/articles/llm-and-dsls.html", "summary": "LLMs generate code incredibly fast, but to ensure they generate exactly what is intended, they need clear boundaries. Abstractions and Domain-Specific Languages (DSLs) provide a strong harness that guides LLMs right from the start. Unmesh Joshi describes how the example of Tickloom - a domain model and DSL for illustrating distributed system behavior - shows how we can use an LLM as a partner to i…", "blog": "Martin Fowler", "published": "2026-07-14", "tags": ["warstory"]}, {"title": "Fragments: July 13", "url": "https://martinfowler.com/fragments/2026-07-13.html", "summary": "Some more of my notes from Thoughtworks Future of Software Development Retreat . When we had our first retreat in Utah early this year, nobody had heard of Harness Engineering . This time we had a whole session on it. When comes to the guide side of harnesses, most of the discussion is about context management. While context windows have increased is size as models get more sophisticated, that doe…", "blog": "Martin Fowler", "published": "2026-07-13", "tags": []}, {"title": "How Netflix Built GenPage: a Single GenAI Model to Build Personalized Homepages", "url": "https://www.infoq.com/news/2026/07/netflix-llm-homepage-generation/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "GenPage is a generative AI system developed by Netflix to replace its traditional multi-stage recommendation pipeline by directly generating personalized user homepages. GenPage leverages user history and request context as a prompt to produce the entire page, resulting in improved user engagement and reduced serving latency. By Sergio De Simone", "blog": "InfoQ Architecture & Design", "published": "2026-07-19", "tags": ["warstory"]}, {"title": "Google's AlphaEvolve Reaches General Availability with Evolutionary Code Optimization as a Service", "url": "https://www.infoq.com/news/2026/07/alphaevolve-generally-available/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Google's AlphaEvolve reached general availability on the Gemini Enterprise Agent Platform, turning the DeepMind research project into an evolutionary code optimization service. Evaluators run client-side so code never leaves the customer's infrastructure. Klarna doubled ML training throughput; practitioners note it only works where a measurable evaluation function exists. By Steef-Jan Wiggers", "blog": "InfoQ Architecture & Design", "published": "2026-07-19", "tags": ["agents"]}, {"title": "AWS Continuum to Enable Agentic Code Security for Enterprises", "url": "https://www.infoq.com/news/2026/07/aws-continuum-code-security/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Amazon Web Services has recently introduced AWS Continuum, a new integrated security platform to automate the discovery, enforcement, and remediation of security issues across codebases, dependencies, and applications. AWS Continuum launches with four agentic capabilities, aiming at the entire vulnerability lifecycle: penetration testing, code review, threat modelling, and code vulnerabilities. By…", "blog": "InfoQ Architecture & Design", "published": "2026-07-16", "tags": ["agents"]}, {"title": "Presentation: The Rust High Performance Talk You Did Not Expect", "url": "https://www.infoq.com/presentations/rust-tps-service/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Ruth Linehan explains how migrating high-performance caching services from Kotlin to Rust shattered internal preconceptions around delivery velocity and engineering overhead. She discusses the ergonomics of the Rust borrow checker, shares how compile-time safety shortens the developer feedback loop, and profiles how tools like Criterion and flamegraphs optimize concurrent code paths. By Ruth Lineh…", "blog": "InfoQ Architecture & Design", "published": "2026-07-16", "tags": ["warstory"]}, {"title": "AI Agents with Cloud Credentials Are Outrunning Billing Guardrails Built for Human-Speed Mistakes", "url": "https://www.infoq.com/news/2026/07/ai-agents-billing-guardrails/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "A three-person agency received a $14,000 AWS bill in one day after attackers extracted static access keys and burned Claude invocations on Bedrock. Combined with May's DN42 incident, where an autonomous agent provisioned $6,531 of oversized infrastructure in 24 hours, practitioners warn that cloud billing lags roughly a day behind agent-speed spend. By Steef-Jan Wiggers", "blog": "InfoQ Architecture & Design", "published": "2026-07-16", "tags": ["agents", "warstory"]}, {"title": "Stripe Benchmark Shows AI Agents Build Integrations but Struggle with Validation", "url": "https://www.infoq.com/news/2026/07/stripe-ai-agents-benchmark/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Stripe introduces a benchmark suite to evaluate whether AI agents can build real-world Stripe integrations across backend, frontend, and browser-based checkout workflows. The study examines end-to-end software engineering capability, focusing on execution, testing, and validation gaps in agentic systems under production-like constraints. By Leela Kumili", "blog": "InfoQ Architecture & Design", "published": "2026-07-15", "tags": ["agents"]}, {"title": "AWS Ships Claude Apps Gateway as Self-Hosted Control Plane for Claude Code and Claude Desktop", "url": "https://www.infoq.com/news/2026/07/claude-apps-gateway-aws/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "AWS and Anthropic have released the Claude apps gateway for AWS, a self-hosted control plane that centralizes identity, policy, telemetry, routing, and spend caps for Claude Code and Claude Desktop. The gateway runs as a single stateless container and routes inference to Amazon Bedrock or Claude Platform on AWS. By Steef-Jan Wiggers", "blog": "InfoQ Architecture & Design", "published": "2026-07-15", "tags": []}, {"title": "Google and Industry Partners Announce Agentic Resource Discovery Specification for AI Agents", "url": "https://www.infoq.com/news/2026/07/agentic-resource-discovery-spec/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Google and industry partners announced Agentic Resource Discovery (ARD) Specification, an open standard for publishing, discovering, and verifying AI tools, APIs, and agents. ARD introduces a discovery layer built on catalogs and registries, enabling dynamic capability discovery while leveraging existing protocols such as MCP and OpenAPI for execution and emphasizing trust and interoperability. By…", "blog": "InfoQ Architecture & Design", "published": "2026-07-14", "tags": ["agents"]}, {"title": "Presentation: Lessons Learned in Migrating to Micro-Frontends", "url": "https://www.infoq.com/presentations/migration-micro-frontend/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Luca Mezzalira shares proven learnings from guiding hundreds of teams through the migration from monolithic web applications to distributed frontend architectures. He explains the core architectural difference between components and micro-frontends, outlines a 6-step decision framework spanning client vs. server rendering, and discusses how to utilize edge compute for safe, iterative rollouts. By …", "blog": "InfoQ Architecture & Design", "published": "2026-07-14", "tags": ["warstory"]}, {"title": "Google's Genkit Ships Agents API with Detached Turns and Human-in-the-Loop for TypeScript and Go", "url": "https://www.infoq.com/news/2026/07/genkit-agents-api-preview/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Google released the Genkit Agents API in preview for TypeScript and Go. The open-source framework packages message history, tool loops, streaming, and state persistence behind a single chat() interface. Detached turns let agents work after clients disconnect. Interruptible tools provide human-in-the-loop control with anti-forgery validation on resume. By Steef-Jan Wiggers", "blog": "InfoQ Architecture & Design", "published": "2026-07-14", "tags": ["agents"]}, {"title": "Article: Comprehension at AI Speed: Building a Context Store for Evolutionary Architecture", "url": "https://www.infoq.com/articles/ai-speed-context-store-architecture/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "AI makes the first 80% of development feel fast, but hides architectural complexity until it's too late. To prevent system instability, engineering leaders must shift from raw throughput to systemic comprehension. By unifying spec-anchored SDD, TDD, and automated fitness functions into a repo-bound \"Context Store,\" teams can ensure AI agents and human reviewers evolve code safely. By Stella Berhe,…", "blog": "InfoQ Architecture & Design", "published": "2026-07-14", "tags": ["agents"]}, {"title": "Evolutionary Data through Schemaboi: Achieving Forward, Backwards, and Sideways Compatibility", "url": "https://www.infoq.com/news/2026/07/durable-document-schema/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "Drawing from the enduring adaptability of HTML and HTTP, Seph Gentle proposes embedding self-contained schemas directly into file headers, ensuring data remains readable without external definitions. His experimental format prioritises forward, backwards, and sideways compatibility, enabling data format evolution without central coordination or data loss By Olimpiu Pop", "blog": "InfoQ Architecture & Design", "published": "2026-07-14", "tags": []}, {"title": "The Path to Sovereign Data: Challenges and Priorities in Local-First Computing", "url": "https://www.infoq.com/news/2026/07/data-ownership-localfirst/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "A panel on data ownership challenged the definition of \"ownership,\" arguing it must extend beyond simple account control to include structural independence, interoperability, and community governance. Speakers like Zenna Fiscella, Paul Frazee, Boris Mann, and Robin Berjon emphasised the need for shared standards, unbundled platforms, and better tools to support user sovereignty. By Olimpiu Pop", "blog": "InfoQ Architecture & Design", "published": "2026-07-13", "tags": []}, {"title": "How DoorDash Built an AI Shopping Assistant That Doesn’t Rely on the LLM Alone", "url": "https://www.infoq.com/news/2026/07/doordash-ai-ask-assistant/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "DoorDash details the architecture behind Ask DoorDash, its AI-powered conversational shopping assistant, combining LLMs, specialized AI agents, MCP-based tooling, and an intelligence layer with persistent consumer memory and live backend data. Early results show up to 24% higher checkout conversion, 17% larger baskets, and improved intent accuracy using memory-backed sessions. By Leela Kumili", "blog": "InfoQ Architecture & Design", "published": "2026-07-13", "tags": ["agents"]}, {"title": "Java News Roundup: TornadoVM 5, JHipster, Google ADK, OmniFish Build of Payara, Introducing Vidocq", "url": "https://www.infoq.com/news/2026/07/java-news-roundup-jul06-2026/?utm_campaign=infoq_content&utm_source=infoq&utm_medium=feed&utm_term=Architecture+%26+Design", "summary": "This week's Java roundup for July 6th, 2026, features news highlighting: the GA release of TornadoVM 5.0; point releases of JHipster, Keycloak and Google ADK; maintenance releases of GraalVM Native Build Tools and Micronaut; the OmniFish Build of Payara and introducing Vidocq, a new implementation of the Jakarta EE 11 Core Profile and MicroProfile 7.1. By Michael Redlich", "blog": "InfoQ Architecture & Design", "published": "2026-07-13", "tags": []}, {"title": "The cost of saying yes has changed", "url": "https://github.blog/engineering/the-cost-of-saying-yes-has-changed/", "summary": "The cost of writing code dropped; the cost of owning it didn't. A framework for deciding which changes are actually cheap in the AI era. The post The cost of saying yes has changed appeared first on The GitHub Blog .", "blog": "The GitHub Blog (Engineering)", "published": "2026-07-17", "tags": []}]}}, "DOCS": {"morning": "# AI/ML Morning Brief\n\n**Week of Jul 5, 2026**\n\n## 1) AI Architecture — Top Developments\n\n- **Cloudflare postmortem:** BYOIP pipeline change withdrew 25% of customer BGP prefixes; \"fail small\" re-architecture underway. [Cloudflare](https://blog.cloudflare.com/cloudflare-outage-february-20-2026/)\n- **Netflix ships \"Upper\" metamodel** — unified data architecture enforcing consistency across content-engineering services. [InfoQ](https://www.infoq.com/news/2025/12/netflix-upper-uda-architecture/)\n- **\"Code as the harness\" gains ground** — wrap agents in executable/verifiable/stateful scaffolding, not bigger prompts. [arXiv](https://arxiv.org/pdf/2605.18747)\n- **Incident-comms benchmark:** Pragmatic Engineer flags Cloudflare's postmortem as the gold standard. [Pragmatic Engineer](https://blog.pragmaticengineer.com/the-pulse-cloudflare-takes-down-half-the-internet/)\n\n## 2) AI Agents — Key News\n\n- **Microsoft \"Frontier\"** — new AI-deployment company; $2.5B, 6,000 experts, enterprise rollouts. [TechCrunch](https://techcrunch.com/2026/07/02/microsoft-launches-its-own-ai-deployment-company-with-2-5-billion-commitment/)\n- **NVIDIA × ServiceNow** — autonomous enterprise agents launched. [NVIDIA](https://blogs.nvidia.com/blog/servicenow-autonomous-ai-agents-enterprises/)\n- **Anthropic Claude Sonnet 5** live (Jun 30); default for Free/Pro Jul 1. [BuildFast](https://www.buildfastwithai.com/blogs/ai-news-today-july-1-2026)\n- **OpenClaw** — self-extending agent tops GitHub star charts; ClawHub 13k+ skills; supply-chain risk flagged. [GitHub](https://github.com/openclaw/openclaw)\n- **Theme:** demos → workflow replacement; \"Super Agents\" unify siloed agents (Levi's). [PYMNTS](https://www.pymnts.com/news/artificial-intelligence/2026/super-agents-are-connecting-what-enterprise-software-kept-separate/)\n\n## 3) Hugging Face Daily Papers — Top Highlights\n\n- **Scaling the Horizon, Not the Parameters** — trillion-param performance from a 35B agent. [HF](https://huggingface.co/papers/trending)\n- **TACO** — Tool-Augmented Credit Optimization for agentic tool use. [HF](https://huggingface.co/papers/trending)\n- **MIMFlow** — masked image modeling + normalizing flows for end-to-end image gen. [HF](https://huggingface.co/papers/trending)\n- **Volume:** ~20 trending/day, 612 for the month. [HF Papers](https://huggingface.co/papers)\n\n## 4) AI Investments — Major Funding\n\n- **Together AI** — $800M Series C, ~$8.3B post-money; Amazon, Aramco, Blackstone in. [Tech Startups](https://techstartups.com/2026/07/02/venture-capital-startup-funding-roundup-july-2-2026/)\n- **Quantum Systems** — $1.2B Series D (Jul 2); defense/autonomous, Munich. [Funding News](https://blog.mean.ceo/ai-startup-funding-news-july-2026/)\n- **Macro:** H1'26 global VC record $510B, AI-led; Q1 ~$300B. [Crunchbase](https://news.crunchbase.com/venture/record-breaking-funding-ai-global-q1-2026/)\n\n## 5) Impact of AI on the Stock Market — Market Moves\n\n- **Chips:** AI semi complex +$2T value YTD; SOX +47% YTD. [Intellectia](https://intellectia.ai/blog/ai-semiconductor-stocks-rally-july-2026)\n- **NVDA:** Q1 FY27 rev $81.6B (+85% YoY); nearing 52-wk high; leadership broadening. [Zacks](https://www.zacks.com/stock/news/2916674/nvidia-shares-rally-toward-52-week-high-buy-more-or-lock-in-gains)\n- **MU:** HBM sold out for 2026; ~$1,089 record (+700% YoY, +11% wk). [StocksDownUnder](https://stocksdownunder.com/why-micron-stock-is-surging-sold-out-ai-memory/)\n- **AMD / QCOM:** double-digit surges; BofA lifts semi TAM to $1.3T. [Intellectia](https://intellectia.ai/blog/ai-semiconductor-stocks-rally-july-2026)\n\n## 6) Curated Technical AI/ML Papers\n\n- **Jun 2026 — Code as Agent Harness** — [2605.18747](https://arxiv.org/pdf/2605.18747) — Survey: code as executable/verifiable/stateful scaffolding for reliable agents.\n- **Jun 2026 — Coding Benchmarks Are Misaligned with Agentic SWE** — [2606.17799](https://arxiv.org/pdf/2606.17799) — Argues popular benchmarks miss what real agentic engineering requires.\n- **Jun 2026 — Layer-Isolated Evaluation** — [2606.11686](https://arxiv.org/pdf/2606.11686) — No-LLM, regression-locked harness gating a production LLM agent.\n- **Apr 2026 — Autonomous Debugging + Dynamic Analysis** — [2604.24212](https://arxiv.org/pdf/2604.24212) — Debugging agents reason over runtime behavior, not just source.\n- **Jan 2026 — Bug-Reproduction Test Cogeneration** — [2601.19066](https://arxiv.org/pdf/2601.19066) — Generates a failing repro test alongside each agent-produced fix.\n- **Jul 2025 — SWE-Exp** — [2507.23361](https://arxiv.org/pdf/2507.23361) — Issue-resolution agents accumulate experience across tasks instead of starting cold.\n\n---\n*Sources: web search, Jul 5 2026. Dates approximate to publication month.*\n", "strategy": "# ↗ Strategy Signals — Talking Points for the Room\n\n**For having a say in your company's AI strategy.** Concise, sourced signals framed as *what to raise* with leadership — not just news.\n\n## Where the money says the puck is going\n\n- **Enterprise agents move from demos to deployment** — Microsoft stood up a $2.5B \"Frontier\" org purely to *deploy* enterprise AI. Signal: the bottleneck is now integration + rollout, not model access. *Raise:* are we resourcing deployment/ops, not just pilots? [TechCrunch](https://techcrunch.com/2026/07/02/microsoft-launches-its-own-ai-deployment-company-with-2-5-billion-commitment/)\n- **Agents get embedded in systems of record** — NVIDIA × ServiceNow shipped autonomous enterprise agents. *Raise:* which of our workflows are agent-ready, and who owns guardrails? [NVIDIA](https://blogs.nvidia.com/blog/servicenow-autonomous-ai-agents-enterprises/)\n- **\"Super Agents\" unify siloed tools** — Levi's is connecting per-function agents into one interface. *Raise:* do we have an agent-integration layer, or N disconnected copilots? [PYMNTS](https://www.pymnts.com/news/artificial-intelligence/2026/super-agents-are-connecting-what-enterprise-software-kept-separate/)\n\n## Infra & cost reality (your retrieval/serving lens)\n\n- **Inference infra is where capital is flowing** — Together AI raised $800M. *Raise:* build vs. buy for our serving/retrieval stack. [Tech Startups](https://techstartups.com/2026/07/02/venture-capital-startup-funding-roundup-july-2-2026/)\n- **Memory is the constraint** — HBM sold out for 2026; semiconductor TAM lifted toward $1.3T. *Raise:* capacity-plan index growth and GPU memory now, not Q4. [Intellectia](https://intellectia.ai/blog/ai-semiconductor-stocks-rally-july-2026)\n\n## Adoption pattern worth copying\n\n- **Winners map one messy process, add human review, prove time/error savings** — then expand. *Raise:* pick one high-friction workflow and instrument it before scaling AI across teams. [Agentic.ai](https://agentic.ai/news)\n\n## What to advocate internally (your edge)\n\n- **Eval harnesses before autonomy** — gate agents with regression-locked, no-LLM tests.\n- **Retrieval cost controls** — hybrid search + rerank budgets; measure tokens per resolved query.\n- **Guardrails on agent PRs** — treat autonomous code changes as a review/attack surface.\n\n---\n*Signals as of the week of the digest; refreshed weekly. Frame these as questions in strategy discussions, not conclusions.*\n", "playbook": "# 🛠 AI Engineering Playbook\n\n**How to get the most from AI in software engineering** — concrete, tested moves for cutting cost, shipping faster, and keeping output trustworthy. Grounded in current best practices and real practitioner reports from this week's HN threads.\n\n## Cut token usage (and cost)\n\n- **Turn on prompt caching** — Anthropic caching bills cached input at ~0.1x (a 90% discount) and now auto-caches multi-turn chats. Biggest single lever for repeated context. [Token Optimize](https://www.tokenoptimize.dev/guides/llm-token-optimization-strategies)\n- **Compact mid-session** — use summarize/compaction so the context window doesn't grow unbounded; a long session gets squeezed into a compact recap. [Redis](https://redis.io/blog/llm-token-optimization-speed-up-apps/)\n- **Persist memory across sessions** — curated memory turns a 50K-token reload into a few hundred tokens. Have the agent maintain its own `plan.md`/docs so it isn't reliant on one session's context. [Token Optimize](https://www.tokenoptimize.dev/guides/context-engineering-reduce-token-usage)\n- **Compress & mask tool output** — logs, files, and RAG chunks compress 60–95% before hitting the model; mask irrelevant tool results instead of pasting them whole. [CoddyKit](https://www.coddykit.com/pages/blog-detail?id=512865&slug=how-to-cut-llm-token-usage-by-90-with-context-compression-a-step-by-step-guide)\n- **Retrieve, don't pack** — fetch only relevant chunks on demand from a vector store rather than stuffing the whole history in the prompt. [LogRocket](https://blog.logrocket.com/stop-wasting-ai-tokens-10-ways-to-reduce-usage/)\n- **Compile fuzzy calls into local functions** — for repeated LLM-API tasks (parse logs, repair JSON, rank by intent), compile the spec into a local \"fuzzy function\" to reclaim locality, reproducibility, and price. [Program-as-Weights](https://arxiv.org/abs/2607.02512)\n- **Minify agent state** — state-in-context agents shrink dramatically with minification/context-pruning. [Minification](https://arxiv.org/pdf/2606.01326) · [Context Pruning](https://arxiv.org/pdf/2605.15315)\n\n## Speed up feature development\n\n- **Plan before you code** — collapse ~20 ambiguous decisions into one reviewed spec so each lands near 100% instead of 80%. The cheapest speed-up there is. [Claude Code Docs](https://code.claude.com/docs/en/best-practices)\n- **Delegate to subagents** — a subagent explores in its own context and reports back a compressed summary, keeping the main session clean and fast (great for large read/exploration tasks). [SmartScope](https://smartscope.blog/en/generative-ai/claude/claude-code-best-practices-advanced-2026/)\n- **Chain the SDLC as skills** — brainstorm → worktree → implementation plan → subagent execution → TDD → review-before-merge (e.g., the \"Superpowers\" collection). [duet.so](https://duet.so/guides/claude-code-skills-complete-guide)\n- **Enforce TDD with hooks** — a deterministic red-green-refactor loop (write failing test → watch it fail → make it pass) via hooks/state machine yields regression-proof code; one HN dev built a 300k-line SaaS this way. [HN](https://news.ycombinator.com/item?id=48413629)\n- **Use a second model as reviewer** — several devs run Codex to review Claude Code output (or vice-versa) as a cheap quality gate. [HN](https://news.ycombinator.com/item?id=48413629)\n\n## Skills to add to a project (and how to manage them)\n\n- **Check skills into the repo** — keep them under `.agents/skills/`, versioned and reviewed via PR, so every contributor inherits the project's conventions automatically. [Developers Digest](https://www.developersdigest.tech/blog/best-claude-code-skills-2026)\n- **Keep 8–12, audit monthly** — that covers most of a senior dev's day; beyond that you pay a \"context tax.\" Delete any skill you haven't triggered in 30 days. [SmartScope](https://smartscope.blog/en/generative-ai/claude/claude-code-best-practices-advanced-2026/)\n- **Right tool for the job** — *Skills* = how to do something; *MCP* = access to external systems; *Subagents* = delegate to a specialist with its own context. [duet.so](https://duet.so/guides/claude-code-skills-complete-guide)\n- **High-ROI starter skills:** branch/PR review, test generation, CI/CD setup, spec-driven scaffolding, incident triage, changelog/release notes, and a repo-conventions linter.\n\n## Keep AI output trustworthy\n\n- **Treat the agent as a fallible teammate** — extensive unit/automation tests, static analysis (e.g., SonarQube), and CI gates on everything merged to main. [HN](https://news.ycombinator.com/item?id=48445024)\n- **Guard the review surface** — autonomous agents that ship code across many PRs are a real attack surface (a payload can be timed across commits); keep human review and CI gating tight. [Distributed Attacks in Persistent-State AI Control](https://arxiv.org/abs/2607.02514)\n- **Prefer deterministic scripts** — for repeatable ops (deploys, scaffolding), have the agent run pre-built scripts instead of improvising API calls, so results are consistent every time. [HN](https://news.ycombinator.com/item?id=48445024)\n\n## Manage context\n\n- **Rules close to the repo** — put project rules where the code lives; keep prompts short and task-specific rather than \"heroic\" mega-prompts. [HN](https://news.ycombinator.com/item?id=48445024)\n- **Watch for context bloat** — too much in context degrades output; lean context beats a kitchen-sink of skills/MCPs. [HN](https://news.ycombinator.com/item?id=48413629)\n\n## Anti-patterns to avoid\n\n- **Vibe coding without the rest of the software** — code isn't the whole product; skipping docs, tests, and design catches up fast.\n- **Skill hoarding** — untriggered skills/MCPs just tax your context window.\n- **Skim reviews** — pattern-skimming misses duplication, bloat, and inconsistent naming that quietly drain productivity.\n- **Burning tokens on non-AI work** — if a plain shell script does the job, automate it without the model.\n\n---\n*Sources: current best-practice guides + practitioner reports from this week's Hacker News threads and arXiv papers in your digest.*\n", "podcast": "# ◇ Story Desk — This Week's Angles\n\nAngles worth developing from this week's items — for a talk, a post, or a deep-dive. Each has a hook, an angle type, talking points, who to talk to, and a source. Biased toward retrieval, agents, and production reality.\n\n## 1. Seconds → milliseconds: Netflix's Cassandra latency fix  *(War Story · LEAD)*\nHook: a classic read-latency nightmare at scale — and the partitioning change that fixed it.\n- What caused seconds-long reads, and how they diagnosed it.\n- The partition/data-model change and its trade-offs.\n- What transfers to any large-index or vector store you run.\n- When to fix the data model vs. throw hardware at it.\nWho to talk to: an engineer who's run large stateful data stores. [InfoQ](https://www.infoq.com/news/2026/07/netflix-cassandra-partition/)\n\n## 2. Memory that survives the session: semantic persistence for LLM workflows  *(Tool/Workflow)*\nHook: RAG isn't just retrieval — it's persisting *workflow knowledge* so agents don't start cold.\n- \"Workflow as Knowledge\": what to persist and how to index it.\n- Where hybrid/semantic retrieval helps vs. hurts in agent memory.\n- Cost and staleness trade-offs of long-lived indexes.\nWho to talk to: a retrieval/RAG practitioner (your wheelhouse). [arXiv](http://arxiv.org/abs/2607.08740v1)\n\n## 3. Serving agents at scale: scheduling when every turn hits an LLM  *(War Story)*\nHook: agentic chat in production lives or dies on scheduling and tail latency.\n- SMetric's session-centric scheduling for serving agents.\n- Throughput vs. per-session fairness; what breaks under load.\n- Guardrails for cost blowups when agents loop.\nWho to talk to: an infra/serving engineer. [arXiv](http://arxiv.org/abs/2607.08565v1)\n\n## 4. Postgres → ClickHouse: when your database stops keeping up  *(War Story)*\nHook: the honest version of a migration story — why they switched and what it cost.\n- Signals it was time to move off Postgres.\n- What ClickHouse bought them, and the sharp edges.\n- How they de-risked the cutover.\nWho to talk to: an engineer who's led a datastore migration. [InfoQ](https://www.infoq.com/news/2026/07/momentic-postgres-clickhouse/)\n\n## 5. TDD with AI, for real: Datadog's test-driven production migration  *(Tool/Workflow)*\nHook: a concrete, reviewable way to use AI coding tools without \"vibe coding\" in prod.\n- The test-first loop that kept the migration safe.\n- Where human review stayed non-negotiable.\n- What made it repeatable vs. a one-off.\nWho to talk to: someone shipping AI-assisted migrations. [InfoQ](https://www.infoq.com/news/2026/07/datadog-ai-production-migration/)\n\n## 6. Latency vs. cost: the multi-region architecture trade-off  *(Architecture)*\nHook: the decision every scaling team faces, laid out with the real trade-offs.\n- What actually drives the latency/cost curve.\n- Patterns that fail quietly at multi-region scale.\n- A decision framework you can reuse Monday.\nWho to talk to: an architect who's run multi-region systems. [InfoQ](https://www.infoq.com/articles/multi-region-latency-cost-tradeoffs/)\n\n---\n**Lead with #1** — a concrete, high-stakes latency war story hooks engineers instantly and frames the whole \"production reality\" theme. #2 and #3 are your retrieval/agents depth plays.\n"}, "WEEK": "2026-07-20"};
const DIGEST = BUNDLE.DIGEST, DOCS = BUNDLE.DOCS;
const VIEWS = [
  { key: "morning",   label: "◉ Morning Brief",    type: "md",   doc: "morning" },
  { key: "retrieval", label: "⌕ Retrieval Desk",   type: "desk", tag: "retrieval" },
  { key: "agents",    label: "⛓ Agents in Prod",   type: "desk", tag: "agents" },
  { key: "warstory",  label: "⚠ War Stories",      type: "desk", tag: "warstory" },
  { key: "strategy",  label: "↗ Strategy Signals", type: "md",   doc: "strategy" },
  { key: "playbook",  label: "⚙ Playbook",         type: "md",   doc: "playbook" },
  { key: "podcast",   label: "◇ Story Desk",       type: "md",   doc: "podcast" },
];
const SRC_LABEL = { arxiv: "arXiv", blogs: "Blog", github: "GitHub", hackernews: "HN" };
let tab = "morning";
const esc = s => (s || "").replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));

function itemsByTag(tag) {
  const src = DIGEST.sources || {}; const out = [];
  for (const k of Object.keys(src)) for (const it of (src[k] || [])) if ((it.tags || []).includes(tag)) out.push({ it, src: k });
  return out;
}
function tabButton(v, count) {
  const div = document.createElement("div");
  div.className = "tab" + (v.key === tab ? " active" : "");
  div.innerHTML = v.label + (count != null ? ` <span class="count">${count}</span>` : "");
  div.onclick = () => { tab = v.key; renderTabs(); renderItems(); };
  return div;
}
function renderTabs() {
  const el = document.getElementById("tabs"); el.innerHTML = "";
  for (const v of VIEWS) {
    if (v.type === "desk") { const c = itemsByTag(v.tag).length; if (!c) continue; el.appendChild(tabButton(v, c)); }
    else el.appendChild(tabButton(v, null));
  }
}
function mdToHtml(md) {
  const lines = (md || "").replace(/\r/g, "").split("\n"); let html = "", inList = false;
  const inline = s => esc(s).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\*(.+?)\*/g, "<em>$1</em>");
  const cl = () => { if (inList) { html += "</ul>"; inList = false; } };
  for (const raw of lines) { const line = raw.trimEnd();
    if (/^#{1,6}\s/.test(line)) { cl(); const lvl = line.match(/^#+/)[0].length; html += `<h${lvl} class="md-h">${inline(line.replace(/^#+\s/, ""))}</h${lvl}>`; }
    else if (/^---+$/.test(line)) { cl(); html += "<hr>"; }
    else if (/^[-*]\s/.test(line)) { if (!inList) { html += '<ul class="md-ul">'; inList = true; } html += `<li>${inline(line.replace(/^[-*]\s/, ""))}</li>`; }
    else if (line === "") { cl(); } else { cl(); html += `<p class="md-p">${inline(line)}</p>`; } }
  cl(); return html;
}
function badge(t) { return `<span class="badge">${esc(String(t))}</span>`; }
function deskCard(it, srcKey) {
  const title = `<a class="title" href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a>`;
  let meta = [`<span class="badge src">${esc(SRC_LABEL[srcKey] || srcKey)}</span>`];
  if (srcKey === "arxiv")  meta.push(badge(it.authors || "—"), badge(it.published));
  if (srcKey === "blogs")  meta.push(badge(it.blog || "blog"), badge(it.published || ""));
  if (srcKey === "github") meta.push(badge("★ " + (it.stars ?? 0)), badge(it.language || "—"));
  let extra = "";
  if (srcKey === "hackernews") {
    meta.push(badge((it.comments ?? 0) + " comments"), `<a class="badge" href="${esc(it.hn_url)}" target="_blank" rel="noopener">HN thread</a>`);
    if (it.discussion_summary) {
      const quotes = (it.top_comments || []).map(c => `<div class="quote">“${esc(c.text)}”<span class="who"> — ${esc(c.author)}</span></div>`).join("");
      extra = `<div class="disc"><div class="disc-h">💬 What people are saying</div><div class="disc-body">${esc(it.discussion_summary)}</div>${quotes}</div>`;
    }
  }
  const summary = it.summary ? `<div class="summary">${esc(it.summary)}</div>` : "";
  return `<div class="card">${title}${summary}${extra}<div class="meta">${meta.join("")}</div></div>`;
}
function renderItems() {
  const root = document.getElementById("content");
  const view = VIEWS.find(v => v.key === tab) || VIEWS[0];
  if (view.type === "md") {
    const md = DOCS[view.doc];
    root.innerHTML = md ? `<div class="brief">${mdToHtml(md)}</div>` : `<div class="empty">Not in this edition.</div>`;
    return;
  }
  const rows = itemsByTag(view.tag);
  root.innerHTML = rows.length ? rows.map(r => deskCard(r.it, r.src)).join("") : `<div class="empty">No items on this desk this week.</div>`;
}
document.getElementById("weeklabel").textContent = BUNDLE.WEEK ? "Week of " + BUNDLE.WEEK : "";
renderTabs(); renderItems();
</script>
